// この半紙の上に他の半紙が重なっている（=覆われている）か
function isCovered(id){
  const p = posts.get(id); if(!p) return false;
  const z = zOverride.get(id) || 0;
  const ax = clamp(nxOf(p,id),0,1)*(WALL_W-NOTE_W), ay = clamp(nyOf(p,id),0,1)*(WALL_H-NOTE_H);
  for(const [oid,op] of posts){
    if(oid===id || (op.hidden && !admin)) continue;
    const oz = zOverride.get(oid) || 0;
    const above = (oz>z) || (oz===z && (op.t||0) > (p.t||0));   // 上に表示されている方
    if(!above) continue;
    const ox = clamp(nxOf(op,oid),0,1)*(WALL_W-NOTE_W), oy = clamp(nyOf(op,oid),0,1)*(WALL_H-NOTE_H);
    const ix = Math.min(ax+NOTE_W,ox+NOTE_W)-Math.max(ax,ox);
    const iy = Math.min(ay+NOTE_H,oy+NOTE_H)-Math.max(ay,oy);
    if(ix>0 && iy>0) return true;
  }
  return false;
}
async function vote(type, id){
  if(!db) return;
  if(id !== activeNoteId && isCovered(id)){   // 覆われている半紙だけ、まず前に出す（誤操作防止）
    raiseNote(id); setActive(id);
    return;
  }
  setActive(id);   // 覆われていない半紙はそのまま投票（選択だけ反映）
  if(type==="sou"){
    if(souDone.has(id)){ toast("もう押したよ"); return; }
    souDone.add(id); saveVotes();
    try{ await runTransaction(ref(db, bpath("posts/"+id+"/sou")), v => (v||0)+1); justVoted = id; render(); toast("そうだね！"); }
    catch(e){ souDone.delete(id); saveVotes(); toast("失敗しました"); }
  } else {
    if(delDone.has(id)){ toast("通報済み"); return; }
    if(!confirm("この投稿を削除依頼（del）しますか？")) return;
    delDone.add(id); saveVotes();
    try{
      await runTransaction(ref(db, bpath("posts/"+id+"/del")), v => (v||0)+1);   // 報告カウントを1だけ加算
      toast("delしました");
    }catch(e){ delDone.delete(id); saveVotes(); toast("失敗しました"); }
  }
}

// 運営：現在のボードを1枚の大画像に合成して自動ダウンロード→新しい空ボードへ切替
let _h2cPromise = null;
function ensureHtml2Canvas(){
  if(window.html2canvas) return Promise.resolve(window.html2canvas);
  if(_h2cPromise) return _h2cPromise;
  _h2cPromise = new Promise((res,rej)=>{
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
    s.onload = ()=> res(window.html2canvas);
    s.onerror = ()=>{ _h2cPromise=null; rej(new Error("html2canvas load failed")); };
    document.head.appendChild(s);
  });
  return _h2cPromise;
}
// 「見たまま版」：背景・各半紙の枠/テープ/名前/ボタン・左下ロゴ込みで画像化（実CSSをそのまま描画）
async function buildFullLookCanvas(){
  const h2c = await ensureHtml2Canvas();
  try{ await document.fonts.ready; }catch(_){}
  const cap = document.createElement("div");
  cap.style.cssText = `position:fixed;left:-99999px;top:0;width:${WALL_W}px;height:${WALL_H}px;overflow:hidden`;
  const wallClone = wallEl.cloneNode(true);              // 背景＋半紙一式を複製
  wallClone.removeAttribute("id");
  wallClone.style.transform = "none";                   // ズーム解除＝等倍
  wallClone.style.left = "0"; wallClone.style.top = "0";
  cap.appendChild(wallClone);
  const header = document.querySelector(".float-header"); // 左下ロゴ
  if(header){
    const logo = header.cloneNode(true);
    logo.style.cssText += ";position:absolute;left:24px;bottom:24px;right:auto;top:auto;opacity:1";
    cap.appendChild(logo);
  }
  document.body.appendChild(cap);
  try{
    return await h2c(cap, { useCORS:true, backgroundColor:null, width:WALL_W, height:WALL_H, scale:1, logging:false, imageTimeout:20000 });
  } finally { cap.remove(); }
}
async function archiveAndAdvance(auto){
  if(!db || !admin){ if(!auto) toast("運営のみ"); return false; }
  if(!auto && !confirm("このボードを画像に保存し、新しい空のボードへ切り替えます。\n現在の半紙は新ボードには表示されなくなります。\nよろしいですか？")) return false;
  toast(auto ? "満員：自動で保存して新ボードへ…" : "画像を作成中…", 4000);
  try{
    // 表示対象（運営は全件）の半紙を集める
    const list = [...posts.entries()].map(([id,p])=>({id,...p})).filter(p=> typeof p.id==="string");
    // 旧base64データだけ先読み（Supabase画像はURLから直接読む）
    await Promise.all(list.map(async p=>{
      if(isImgData(imgCache.get(p.id)) || isSafePath(p.imgPath)) return;
      try{ const s = await get(ref(db, bpath("imgs/"+p.id))); const d = s && s.val(); if(isImgData(d)) imgCache.set(p.id, d); }catch(e){}
    }));
    render();   // プリフェッチした画像をDOMに反映（見たまま版の複製で欠けないように）
    // 大きなキャンバスへ合成
    const cv = document.createElement("canvas"); cv.width = WALL_W; cv.height = WALL_H;
    const g = cv.getContext("2d");
    g.fillStyle = "#ece3cd"; g.fillRect(0,0,WALL_W,WALL_H);   // 壁の色
    const loadImg = src => new Promise(res=>{ const im=new Image(); im.crossOrigin="anonymous"; im.onload=()=>res(im); im.onerror=()=>res(null); im.src=src; });
    for(const p of list){
      const src = noteImgSrc(p.id); if(!src) continue;        // dataURL か Supabase 公開URL
      const im = await loadImg(src); if(!im) continue;
      const x = clamp(nxOf(p,p.id),0,1)*(WALL_W-NOTE_W);
      const y = clamp(nyOf(p,p.id),0,1)*(WALL_H-NOTE_H);
      const w = NOTE_W, h = NOTE_W*1.5;          // 半紙の画像部（2:3）
      g.save();
      g.translate(x + w/2, y + h/2);
      g.rotate((p.angle||0)*Math.PI/180);
      g.drawImage(im, -w/2, -h/2, w, h);
      g.restore();
    }
    const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
    // 記録画像を Supabase に保存（自動・手動とも）
    if(supa && !SUPA_ANON.startsWith("（")){
      try{
        const blob = await new Promise(res=> cv.toBlob(res, "image/jpeg", 0.85));
        if(blob){
          const apath = "archives/board-"+(boardId||1)+"-"+stamp+".jpg";
          await supa.storage.from(SUPA_BUCKET).upload(apath, blob, { contentType:"image/jpeg", upsert:false });
        }
      }catch(e){ console.error("アーカイブ保存失敗", e); }
    }
    // 手動時はブラウザにもダウンロード（自動はクリック起点が無く弾かれ得るので保存先はSupabase）
    if(!auto){
      const url = cv.toDataURL("image/jpeg", 0.85);
      const a = document.createElement("a");
      a.href = url; a.download = "oshuji-board-"+(boardId||1)+"-"+stamp+".jpg";
      document.body.appendChild(a); a.click(); a.remove();
    }
    // 見たまま版（背景・ロゴ・半紙の枠/ボタン込み）も保存。失敗してもクリーン版と切替は続行
    try{
      const full = await buildFullLookCanvas();
      if(full){
        if(supa && !SUPA_ANON.startsWith("（")){
          const fblob = await new Promise(res=> full.toBlob(res, "image/jpeg", 0.85));
          if(fblob){ await supa.storage.from(SUPA_BUCKET).upload("archives/board-"+(boardId||1)+"-"+stamp+"-full.jpg", fblob, { contentType:"image/jpeg", upsert:false }); }
        }
        if(!auto){
          const furl = full.toDataURL("image/jpeg", 0.85);
          const a2 = document.createElement("a");
          a2.href = furl; a2.download = "oshuji-board-"+(boardId||1)+"-"+stamp+"-full.jpg";
          document.body.appendChild(a2); a2.click(); a2.remove();
        }
      }
    }catch(e){ console.error("見たまま版の保存に失敗（クリーン版は保存済み）", e); }
    // 新しいボードへ（運営のみ書ける）。全クライアントが meta/board 監視で自動移行
    await set(ref(db, "meta/board"), (boardId||1) + 1);
    toast(auto ? "満員のため新ボードへ自動切替しました" : "保存しました。新しいボードに切り替えました", 4000);
    return true;
  }catch(e){ console.error(e); toast("保存に失敗しました"); return false; }
}
window.archiveAndAdvance = archiveAndAdvance;

// 運営タブだけ：満員を検知したら自動で保存→新ボード（複数タブでも1つだけ実行）
let autoArchiving = false;
async function maybeAutoArchive(){
  if(!admin || autoArchiving || boardId == null) return;

    }
  }catch(e){ console.error(e); }
  finally{ autoArchiving = false; }
}

/* ---------- zoom & scroll ---------- */
function applyZoom(){
  wallEl.style.transform = "scale("+zoom+")";
  sizerEl.style.width  = (WALL_W*zoom)+"px";
  sizerEl.style.height = (WALL_H*zoom)+"px";
  const zr = document.getElementById("zoomRange");
  const zv = document.getElementById("zoomVal");
  if(zr) zr.value = zoom;
  if(zv) zv.textContent = Math.round(zoom*100)+"%";
  if(pinching) return;   // ピンチ中は軽く保つ。確定時にまとめて再描画
  if(typeof drawMinimap === "function") drawMinimap();
  scheduleLazy();
}
function computeZoomMin(){
  const fitH = scrollEl.clientHeight / WALL_H;
  zoomMin = Math.max(0.05, Math.floor(fitH*100)/100);
  const zr = document.getElementById("zoomRange");
  if(zr){ zr.min = zoomMin; zr.step = 0.01; }
  if(zoom < zoomMin){ zoomTo(zoomMin); }
}
// anchorClientX/Y を指定すると、その画面位置の指す壁の点を固定したままズーム
function zoomTo(z, anchorClientX, anchorClientY){
  const prev = zoom;
  z = clamp(Math.round(z*100)/100, zoomMin, ZOOM_MAX);
  if(z === zoom){ applyZoom(); return; }
  const r = scrollEl.getBoundingClientRect();
  const ax = (anchorClientX==null) ? scrollEl.clientWidth/2  : (anchorClientX - r.left);
  const ay = (anchorClientY==null) ? scrollEl.clientHeight/2 : (anchorClientY - r.top);
  const natX = (scrollEl.scrollLeft + ax) / zoom;
  const natY = (scrollEl.scrollTop  + ay) / zoom;
  zoom = z;
  applyZoom();
  scrollEl.scrollLeft = clamp(natX*zoom - ax, 0, Math.max(0, WALL_W*zoom - scrollEl.clientWidth));
  scrollEl.scrollTop  = clamp(natY*zoom - ay, 0, Math.max(0, WALL_H*zoom - scrollEl.clientHeight));
  notifyZoomedOut(prev);
}
// ピンチ専用：細かい刻みでアンカー固定だけ行う軽量版（丸め1/1000・重い処理なし）
function pinchZoom(z, anchorClientX, anchorClientY){
  z = clamp(Math.round(z*1000)/1000, zoomMin, ZOOM_MAX);
  if(z === zoom) return;
  const prev = zoom;
  const r = scrollEl.getBoundingClientRect();
  const ax = anchorClientX - r.left, ay = anchorClientY - r.top;
  const natX = (scrollEl.scrollLeft + ax) / zoom;
  const natY = (scrollEl.scrollTop  + ay) / zoom;
  zoom = z;
  applyZoom();
  scrollEl.scrollLeft = clamp(natX*zoom - ax, 0, Math.max(0, WALL_W*zoom - scrollEl.clientWidth));
  scrollEl.scrollTop  = clamp(natY*zoom - ay, 0, Math.max(0, WALL_H*zoom - scrollEl.clientHeight));
  notifyZoomedOut(prev);   // モバイルのピンチでも広角案内を出す
}
let lastZoomOutNote = 0;
function notifyZoomedOut(prev){
  // 半紙が小さすぎて画像読み込みを保留する領域（NOTE_W*zoom<56）に、引きで入った瞬間だけ案内
  if(!didInitialFocus) return;
  if(NOTE_W*zoom < 56 && NOTE_W*prev >= 56 && Date.now()-lastZoomOutNote > 6000){
    lastZoomOutNote = Date.now();
    toast("最大ズームアウト状態では個別の半紙が読み込まれません。", 3800);
  }
}
document.getElementById("zoomRange").addEventListener("input", e=> zoomTo(+e.target.value));
const zoomStep = ()=> isMobileView() ? 0.2 : 0.1;   // モバイルはピンチが重いので、ボタン1回で20%（PCは従来の10%）
document.getElementById("zoomIn").addEventListener("click", ()=> zoomTo(zoom+zoomStep()));
document.getElementById("zoomOut").addEventListener("click", ()=> zoomTo(zoom-zoomStep()));
window.addEventListener("resize", ()=>{ computeZoomMin(); drawMinimap(); });

// ホイールで拡大率調整（カーソル位置を中心に。全体が見えるところまで縮小可）
scrollEl.addEventListener("wheel", e=>{
  e.preventDefault();
  zoomTo(zoom + (e.deltaY<0 ? 0.1 : -0.1), e.clientX, e.clientY);
}, {passive:false});

// 2本指ピンチで拡大縮小（スマホ用。1本指は通常スクロール）
let pinchActive=false, pinchStartDist=0, pinchStartZoom=1, pinchRaf=0, pinchPending=null;
const PINCH_GAIN = 1.6;   // 指距離比に掛ける感度（>1で同じピンチ量でも拡大幅が大きい）
function touchDist(a,b){ return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY); }
function flushPinch(){
  pinchRaf = 0;
  if(!pinchPending) return;
  const p = pinchPending; pinchPending = null;
  const ratio = p.d / pinchStartDist;
  pinchZoom(pinchStartZoom * Math.pow(ratio, PINCH_GAIN), p.mx, p.my);   // 距離比にゲイン
}
function endPinch(){
  pinchActive = false;
  if(pinchRaf){ cancelAnimationFrame(pinchRaf); pinchRaf = 0; }
  pinchPending = null;
  if(pinching){ pinching = false; applyZoom(); }   // 確定：ミニマップ・遅延読込をまとめて
}
scrollEl.addEventListener("touchstart", e=>{
  if(e.touches.length===2){
    pinchActive=true; pinching=true;
    pinchStartDist=touchDist(e.touches[0],e.touches[1]) || 1;
    pinchStartZoom=zoom;
    e.preventDefault();
  }
}, {passive:false});
scrollEl.addEventListener("touchmove", e=>{
  if(pinchActive && e.touches.length===2){
    e.preventDefault();
    pinchPending = {
      d: touchDist(e.touches[0],e.touches[1]),
      mx: (e.touches[0].clientX+e.touches[1].clientX)/2,
      my: (e.touches[0].clientY+e.touches[1].clientY)/2
    };
    if(!pinchRaf) pinchRaf = requestAnimationFrame(flushPinch);   // 1フレーム1回に集約
  }
}, {passive:false});
scrollEl.addEventListener("touchend", e=>{ if(e.touches.length<2) endPinch(); });
scrollEl.addEventListener("touchcancel", endPinch);

/* ダブルクリック／ダブルタップ：何もない所は拡大、半紙はフォーカスして拡大（PC・モバイル共通） */
function doubleActivate(clientX, clientY, noteElm){
  const hit = document.elementFromPoint(clientX, clientY);
  const ne = noteElm || (hit ? hit.closest(".note") : null);
  if(ne){
    const id = ne.dataset.id, p = posts.get(id);
    if(p){ raiseNote(id); setActive(id); centerOnNote(id, p, Math.min(ZOOM_MAX, Math.max(1.5, zoom))); return; }
  }
  zoomTo(Math.min(ZOOM_MAX, Math.max(1.5, zoom*1.6)), clientX, clientY);   // 何もない所は拡大
}
scrollEl.addEventListener("dblclick", e=>{
  if(placing) return;
  e.preventDefault();
  doubleActivate(e.clientX, e.clientY, e.target.closest(".note"));
});
let lastTapT=0, lastTapX=0, lastTapY=0;
scrollEl.addEventListener("touchend", e=>{
  if(placing || pinchActive || e.changedTouches.length!==1) return;
  const t = e.changedTouches[0], now = Date.now();
  if(now-lastTapT < 300 && Math.hypot(t.clientX-lastTapX, t.clientY-lastTapY) < 30){
    lastTapT = 0;
    doubleActivate(t.clientX, t.clientY, null);   // ダブルタップ
  } else {
    lastTapT = now; lastTapX = t.clientX; lastTapY = t.clientY;
  }
}, {passive:true});

// 左ドラッグでボード内を動かす（マウスのみ。タッチは標準スクロール）
let panning=false, panMoved=false, panSX=0, panSY=0, panSL=0, panST=0, suppressClick=false;
scrollEl.addEventListener("pointerdown", e=>{
  if(e.button!==0 || e.pointerType!=="mouse") return;
  panning=true; panMoved=false;
  panSX=e.clientX; panSY=e.clientY;
  panSL=scrollEl.scrollLeft; panST=scrollEl.scrollTop;
});
window.addEventListener("pointermove", e=>{
  if(!panning) return;
  const dx=e.clientX-panSX, dy=e.clientY-panSY;
  if(!panMoved && (Math.abs(dx)+Math.abs(dy))>5){ panMoved=true; scrollEl.classList.add("grabbing"); }
  if(panMoved){ scrollEl.scrollLeft = panSL-dx; scrollEl.scrollTop = panST-dy; }
});
window.addEventListener("pointerup", ()=>{
  if(panning && panMoved) suppressClick=true; // ドラッグ後のクリックは無効化
  panning=false; scrollEl.classList.remove("grabbing");
});
scrollEl.addEventListener("click", e=>{
  if(suppressClick){ e.stopPropagation(); e.preventDefault(); suppressClick=false; }
}, true);

function randomStartScroll(){
  const vw = scrollEl.clientWidth, vh = scrollEl.clientHeight;
  const maxX = Math.max(0, WALL_W*zoom - vw);
  const maxY = Math.max(0, WALL_H*zoom - vh);
  scrollEl.scrollLeft = Math.random()*maxX;
  scrollEl.scrollTop  = Math.random()*maxY;
}

/* ---------- minimap ---------- */
const miniCanvas = document.getElementById("miniCanvas");
function flashNote(id){
  freshNotes.set(id, Date.now());   // 約6秒だけ点滅（未読そのものは seenT で判定）
  if(!flashRaf) flashRaf = requestAnimationFrame(flashTick);
  updateFreshUI();
}
function flashTick(){
  flashRaf = 0;
  const now = Date.now();
  for(const [id,t] of freshNotes){ if(now - t >= 6000) freshNotes.delete(id); }   // 点滅し終わったものは掃除
  drawMinimap();
  if(freshNotes.size > 0) flashRaf = requestAnimationFrame(flashTick);
}
/* ---- 未読しおり（前回からの差分）。ボード毎に時刻1個をLS保存 ---- */
function seenKey(){ return "fg_seen_b" + (boardId==null?0:boardId); }
function saveSeenT(){ try{ LS.set(seenKey(), String(seenT)); }catch(_){} }
function loadSeenT(){
  let v=null; try{ v = LS.get(seenKey()); }catch(_){}
  if(v==null){ seenT = Date.now(); saveSeenT(); }   // 初回訪問：既存は全部「既読」扱い（大量に降ってこないように）
  else { seenT = Number(v) || 0; }
  seenT0 = seenT;            // セッション中の未読基準を固定（途中で動かさない＝新規は常に未読側）
  viewedIds.clear();
}
function isUnread(id,p){ return !!p && (p.t||0) > seenT0 && !viewedIds.has(id) && p.uid !== myUid && (admin || !p.hidden); }
function unreadList(){   // 前回からの未読を古い→新しい（[[id,p],...]）
  return [...posts.entries()].filter(([id,p])=> isUnread(id,p)).sort((a,b)=> (a[1].t||0)-(b[1].t||0));
}
function unreadCount(){ return unreadList().length; }
function markSeen(id,p){   // 見た＝そのidを既読に。永続しおりは最新側へ前進。点滅も止める
  viewedIds.add(id);
  if(p && (p.t||0) > seenT){ seenT = p.t; saveSeenT(); }
  freshNotes.delete(id);
  updateFreshUI(); drawMinimap();
}
function updateFreshUI(){
  const n = unreadCount();
  const cluster = document.querySelector(".nav-cluster");
  if(cluster) cluster.classList.toggle("has-fresh", n>0);
  const badge = document.getElementById("freshBadge");
  if(badge){ badge.textContent = n>99 ? "99+" : String(n); badge.style.display = n>0 ? "" : "none"; }
}
function drawMinimap(){
  if(!miniCanvas) return;
  const mmW = miniCanvas.clientWidth, mmH = miniCanvas.clientHeight;
  if(!mmW || !mmH) return;
  if(miniCanvas.width !== Math.round(mmW*DPR)){ miniCanvas.width = Math.round(mmW*DPR); miniCanvas.height = Math.round(mmH*DPR); }
  const g = miniCanvas.getContext("2d");
  g.setTransform(DPR,0,0,DPR,0,0);
  g.clearRect(0,0,mmW,mmH);
  const sx = mmW/WALL_W, sy = mmH/WALL_H;
  const now = Date.now();
  for(const [id,p] of posts){
    if(p.hidden && !admin) continue;
    const x = clamp(nxOf(p,id),0,1)*(WALL_W-NOTE_W)*sx;
    const y = clamp(nyOf(p,id),0,1)*(WALL_H-NOTE_H)*sy;
    const lw = p.land ? NOTE_H*0.82 : NOTE_W;   // 横長は幅広・縦短
    const lh = p.land ? NOTE_W : NOTE_H*0.85;
    const w = Math.max(2, lw*sx), h = Math.max(2, lh*sy);
    const ft = freshNotes.get(id);
    if(isUnread(id,p)){                                   // 前回からの未読＝白
      const blink = (ft != null && now - ft < 6000) ? (Math.floor(now/260)%2===0) : true;  // 直近の追加は点滅、それ以外は白実体
      if(blink){
        g.save();
        g.fillStyle = "#ffffff"; g.shadowColor = "rgba(255,255,255,.95)"; g.shadowBlur = 6;
        g.fillRect(x-1, y-1, w+2, h+2);   // 未読（白）
        g.restore();
        continue;
      }
    }
    g.fillStyle = p.hidden ? "rgba(181,52,31,.55)" : "#3a332b";
    g.fillRect(x, y, w, h);
  }
  const vx = (scrollEl.scrollLeft/(WALL_W*zoom))*mmW;
  const vy = (scrollEl.scrollTop /(WALL_H*zoom))*mmH;
  const vw = Math.min(mmW, (scrollEl.clientWidth /(WALL_W*zoom))*mmW);
  const vh = Math.min(mmH, (scrollEl.clientHeight/(WALL_H*zoom))*mmH);
  g.strokeStyle = "#b5341f"; g.lineWidth = 1.5;
  g.strokeRect(vx+0.5, vy+0.5, Math.max(3,vw-1), Math.max(3,vh-1));
}
function miniJump(clientX, clientY){
  stopNavHint();   // 見る動線を選択（点滅を止める）
  const r = miniCanvas.getBoundingClientRect();
  const fx = clamp((clientX-r.left)/r.width, 0, 1);
  const fy = clamp((clientY-r.top )/r.height,0, 1);
  scrollEl.scrollLeft = clamp(fx*WALL_W*zoom - scrollEl.clientWidth/2,  0, Math.max(0, WALL_W*zoom - scrollEl.clientWidth));
  scrollEl.scrollTop  = clamp(fy*WALL_H*zoom - scrollEl.clientHeight/2, 0, Math.max(0, WALL_H*zoom - scrollEl.clientHeight));
}
let miniDown=false;
miniCanvas.addEventListener("pointerdown", e=>{ miniDown=true; miniJump(e.clientX,e.clientY); e.preventDefault(); });
miniCanvas.addEventListener("pointermove", e=>{ if(miniDown){ miniJump(e.clientX,e.clientY); e.preventDefault(); } });
window.addEventListener("pointerup", ()=>{ miniDown=false; });

let mmRaf=0;
scrollEl.addEventListener("scroll", ()=>{ if(!mmRaf) mmRaf=requestAnimationFrame(()=>{ mmRaf=0; drawMinimap(); }); scheduleLazy(); });

/* ---------- 半紙めぐり ---------- */
let meguriIdx = -1;
function visibleByRecency(){
  return [...posts.entries()].filter(([id,p])=> admin || !p.hidden)
    .sort((a,b)=> (b[1].t||0)-(a[1].t||0));
}
// 「半紙にかく」パネルに隠れない着地点（ビューポート内の座標）を返す
function focusAnchor(){
  const vw = scrollEl.clientWidth, vh = scrollEl.clientHeight;
  let ax = vw/2, ay = vh/2;
  const half = (NOTE_H*zoom)/2 + 10;   // 半紙の高さ半分ぶんの余白
  if(floatDesk && !floatDesk.classList.contains("collapsed")){
    const d = floatDesk.getBoundingClientRect(), sc = scrollEl.getBoundingClientRect();
    const dLeft = d.left - sc.left, dRight = d.right - sc.left, dBottom = d.bottom - sc.top;
    if(dLeft <= ax && dRight >= ax){            // 机が画面中央の列を覆っている
      const avail = vh - dBottom;
      if(avail >= NOTE_H*zoom + 60){            // 机の下に半紙が収まる→その中央へ
        ay = dBottom + avail/2;
      } else {                                   // 下が狭い→机の右側に寄せる
        ax = Math.min(vw - half, (dRight + vw)/2);
      }
    }
  }
  return {ax, ay};
}
function centerOnNote(id, p, targetZoom){
  const target = (targetZoom != null) ? targetZoom : ((window.innerWidth <= 560) ? 1.0 : 1.3);  // 既定: PC130%/モバイル100%
  const z = clamp(target, zoomMin, ZOOM_MAX);
  if(z !== zoom){ zoom = z; applyZoom(); }
  const px = (clamp(nxOf(p,id),0,1)*(WALL_W-NOTE_W) + NOTE_W/2) * zoom;
  const py = (clamp(nyOf(p,id),0,1)*(WALL_H-NOTE_H) + NOTE_H/2) * zoom;
  const {ax, ay} = focusAnchor();
  scrollEl.scrollLeft = clamp(px - ax, 0, Math.max(0, WALL_W*zoom - scrollEl.clientWidth));
  scrollEl.scrollTop  = clamp(py - ay, 0, Math.max(0, WALL_H*zoom - scrollEl.clientHeight));
  drawMinimap();
  raiseNote(id);   // フォーカス対象を最前面に（下になっていても見えるように）
  requestAnimationFrame(()=>{
    notesEl.querySelectorAll('.note.found').forEach(n=> n.classList.remove("found"));  // 他の半紙の赤枠は消す
    const el = notesEl.querySelector('.note[data-id="'+id+'"]');
    if(el){ void el.offsetWidth; el.classList.add("found"); }
  });
}
function gotoNote(step){
  stopNavHint();   // 見る動線を選択（点滅を止める）
  const meguriCollapse = ()=>{ if(!floatDesk.classList.contains("collapsed")) setDeskCollapsed(true); };  // めぐり開始＝半紙は畳んで見やすく
  const u = unreadList();   // 未読を古い→新しい
  if(u.length){
    // 未読があれば常に未読優先。▶＝最古の未読から順に / ◀＝最新の未読を、押すたびに端から1枚ずつ消化（古い順に読み進められる）
    const [id,p] = (step >= 0) ? u[0] : u[u.length-1];
    meguriCollapse(); markSeen(id, p); centerOnNote(id, p);
    return;
  }
  // 未読が無くなったら自由閲覧（全体を最近順で巡回）
  const list = visibleByRecency();
  if(!list.length){ toast("まだ半紙がないよ"); return; }
  meguriIdx = ((meguriIdx + step) % list.length + list.length) % list.length;
  const [id,p] = list[meguriIdx];
  meguriCollapse(); centerOnNote(id, p);
}
document.getElementById("prevNote").addEventListener("click", ()=> gotoNote(-1));
document.getElementById("nextNote").addEventListener("click", ()=> gotoNote(1));

/* ---------- 起動時：貼られた半紙のどれかにランダムでフォーカス ---------- */
let didInitialFocus = false;
let focusTimer = null;
// 指定ズームで寄せたとき、その半紙の中心が画面の安全な縦範囲に収まるか
function focusReachable(id, p, z){
  const vh = scrollEl.clientHeight;
  const {ay} = focusAnchor();
  const py = (clamp(nyOf(p,id),0,1)*(WALL_H-NOTE_H) + NOTE_H/2) * z;
  const st = clamp(py - ay, 0, Math.max(0, WALL_H*z - vh));
  const sy = py - st;                       // 画面上のY
  const topSafe = 60;                        // ヘッダーぶん
  const bottomSafe = vh - 150;               // 半紙めぐり／マップぶん
  return sy >= topSafe && sy <= bottomSafe;
}
function initialFocus(){
  if(didInitialFocus) return;
  const full = visibleByRecency();
  if(!full.length) return;       // まだ無ければ何もしない（次の追加で再トライ）
  didInitialFocus = true;
  // 2回目以降の訪問で未読があれば、最新の未読にフォーカス。初回訪問（seenT=今で未読0）や未読なしはランダムのまま
  const u = unreadList();        // 未読を古い→新しい
  if(u.length){
    const [id,p] = u[u.length-1];                 // 最新の未読
    meguriIdx = full.findIndex(e=> e[0]===id);    // めぐりの番号も合わせる
    centerOnNote(id, p, Math.min(ZOOM_MAX, 1.8)); // 読みやすい倍率で（既読化はしない＝未読は保持）
    return;
  }
  const focusZoom = clamp(1.0 + Math.random()*(ZOOM_MAX-1.0), 1.0, ZOOM_MAX);  // 100%以上でランダム
  let list = full;
  if(window.innerWidth <= 560){  // モバイル: 下部UIに隠れる位置にしか置けない半紙は候補から外す
    const ok = full.filter(([id,p])=> focusReachable(id, p, focusZoom));
    if(ok.length) list = ok;     // 候補があれば絞り込み、無ければ全体から選ぶ
  }
  const [id,p] = list[Math.floor(Math.random()*list.length)];
  meguriIdx = full.findIndex(e=> e[0]===id);   // めぐりの番号は全体基準で合わせる
  centerOnNote(id, p, focusZoom);   // 開いたときは100%以上のランダム倍率でフォーカス
}

}
const isTouchDev = window.matchMedia && matchMedia("(pointer: coarse)").matches;
if(isTouchDev) document.body.classList.add("touch");        // タッチ端末（向きは手動「横」ボタンで切替）
setLandscape(LS.get("fg_orient")==="land", false);          // 前回選んだ向きを復元（PC・タッチ共通／端末の回転には依存しない）
// 半紙に色が乗っているか（PAPER以外の画素があるか）をざっくり判定。間引きスキャンで軽量
function canvasHasInk(){
  try{
    const w=pad.width, h=pad.height; if(!w||!h) return false;
    const rgb = hexToRgb(PAPER); if(!rgb) return false;
    const d = ctx.getImageData(0,0,w,h).data;
    for(let i=0;i<d.length;i+=4*8){   // 8画素ごとに確認（クリック時のみなので十分速い）
      if(Math.abs(d[i]-rgb.r)>6 || Math.abs(d[i+1]-rgb.g)>6 || Math.abs(d[i+2]-rgb.b)>6) return true;
    }
    return false;
  }catch(e){ return false; }
}
if(deskOrientBtn) deskOrientBtn.addEventListener("click", e=>{
  e.stopPropagation();
  // 普通は最初に向きを決めるので、描いた後の切替はまれ。何か描いてある時だけ「消えるよ」と確認
  if(canvasHasInk() && !confirm("半紙の向きを変えると、いま描いたものは消えます。よろしいですか？")) return;
  setLandscape(!landscape, true, true);   // 第3引数=clear：切替時は中身を引き継がない
});


// ---- 半紙パネルをドラッグで好きな位置へ（バーの＋/−以外を掴む） ----
let deskDragging=false, deskMoved=false, deskOffX=0, deskOffY=0;
function clampDeskPos(left, top){
  const w = floatDesk.offsetWidth, barH = deskBar.offsetHeight || 40;
  const maxLeft = Math.max(6, window.innerWidth  - w   - 6);
  const maxTop  = Math.max(6, window.innerHeight - barH - 6);   // バーは必ず画面内に残す
  return { left: clamp(left, 6, maxLeft), top: clamp(top, 6, maxTop) };
}
function setDeskPos(left, top, save){
  const p = clampDeskPos(left, top);
  floatDesk.style.left = p.left + "px";
  floatDesk.style.top  = p.top  + "px";
  floatDesk.style.right = "auto"; floatDesk.style.bottom = "auto";
  if(save) LS.set("fg_deskpos", JSON.stringify(p));
}
function reclampDesk(){ if(floatDesk.style.left){ const r = floatDesk.getBoundingClientRect(); setDeskPos(r.left, r.top, false); } }
deskBar.addEventListener("pointerdown", e=>{
  if(e.target.closest("button")) return;   // バー上のボタン（開閉・切替）の上では掴まない。残りで移動
  deskDragging = true; deskMoved = false;
  const r = floatDesk.getBoundingClientRect();
  deskOffX = e.clientX - r.left; deskOffY = e.clientY - r.top;
  deskBar.classList.add("dragging");
  try{ deskBar.setPointerCapture(e.pointerId); }catch(_){}
});
deskBar.addEventListener("pointermove", e=>{
  if(!deskDragging) return;
  deskMoved = true;
  setDeskPos(e.clientX - deskOffX, e.clientY - deskOffY, false);
  e.preventDefault();
});
function endDeskDrag(e){
  if(!deskDragging) return;
  deskDragging = false;
  deskBar.classList.remove("dragging");
  try{ deskBar.releasePointerCapture(e.pointerId); }catch(_){}
  if(deskMoved){ const r = floatDesk.getBoundingClientRect(); setDeskPos(r.left, r.top, true); }   // 確定位置を保存
}
deskBar.addEventListener("pointerup", endDeskDrag);
deskBar.addEventListener("pointercancel", endDeskDrag);
// 起動時に保存位置を復元（クランプ）。リサイズで画面外に出ないよう再クランプ
(function(){ try{ const s = LS.get("fg_deskpos"); if(s){ const p = JSON.parse(s); setDeskPos(p.left, p.top, false); } }catch(_){} })();
window.addEventListener("resize", ()=>{ reclampDesk(); });

/* ---------- 汎用：浮遊ウィジェットをドラッグで移動（位置はLS保存・画面外に出ない） ---------- */
function makeDraggable(el, lsKey, ignoreSel){
  if(!el) return;
  let dragging=false, moved=false, offX=0, offY=0;
  function setPos(left, top, save){
    const w=el.offsetWidth, h=el.offsetHeight;
    const maxLeft=Math.max(6, window.innerWidth  - w - 6);
    const maxTop =Math.max(6, window.innerHeight - h - 6);
    const L=clamp(left,6,maxLeft), T=clamp(top,6,maxTop);
    el.style.left=L+"px"; el.style.top=T+"px"; el.style.right="auto"; el.style.bottom="auto";
    if(save) LS.set(lsKey, JSON.stringify({left:L, top:T}));
  }
  function reclamp(){ if(el.style.left){ const r=el.getBoundingClientRect(); setPos(r.left, r.top, false); } }
  el.addEventListener("pointerdown", e=>{
    if(ignoreSel && e.target.closest(ignoreSel)) return;   // 操作部品の上では掴まない
    dragging=true; moved=false;
    const r=el.getBoundingClientRect();
    offX=e.clientX-r.left; offY=e.clientY-r.top;
    el.classList.add("dragging");
    try{ el.setPointerCapture(e.pointerId); }catch(_){}
  });
  el.addEventListener("pointermove", e=>{
    if(!dragging) return;
    moved=true; setPos(e.clientX-offX, e.clientY-offY, false); e.preventDefault();
  });
  function endDrag(e){
    if(!dragging) return; dragging=false; el.classList.remove("dragging");
    try{ el.releasePointerCapture(e.pointerId); }catch(_){}
    if(moved){ const r=el.getBoundingClientRect(); setPos(r.left, r.top, true); }   // 確定位置を保存
  }
  el.addEventListener("pointerup", endDrag);
  el.addEventListener("pointercancel", endDrag);
  try{ const s=LS.get(lsKey); if(s){ const p=JSON.parse(s); setPos(p.left, p.top, false); } }catch(_){}   // 前回位置を復元
  window.addEventListener("resize", reclamp);
}
// ズームツール：ボタン(.zbtn)とスライダー(input)以外で掴んで移動
makeDraggable(document.querySelector(".float-tools"), "fg_toolspos", ".zbtn, input");
// マップ＋半紙めぐり：ボタンとミニマップ以外で掴んで、クラスタ一体で移動
makeDraggable(document.querySelector(".nav-cluster"), "fg_navpos", "button, .minimap");

// 配置リセット：半紙・マップ・ズームをドラッグ前の既定位置に戻す（インライン位置を消す＝CSS既定へ）
function resetWidgetPositions(){
  floatDesk.style.left = floatDesk.style.top = floatDesk.style.right = floatDesk.style.bottom = "";   // 半紙
  [".float-tools", ".nav-cluster"].forEach(sel=>{
    const el = document.querySelector(sel);
    if(el){ el.style.left = el.style.top = el.style.right = el.style.bottom = ""; }                    // ズーム・ナビ
  });
  try{ LS.del("fg_deskpos"); LS.del("fg_toolspos"); LS.del("fg_navpos"); }catch(_){}                   // 保存位置も破棄
  toast("配置を元に戻したよ");
}
const deskResetBtn = document.getElementById("deskReset");
if(deskResetBtn) deskResetBtn.addEventListener("click", e=>{ e.stopPropagation(); resetWidgetPositions(); });

/* もっと下に道具がある時だけ ▼ を出す（モバイル・スクロール可能・最下部でない） */
const deskBodyEl = document.getElementById("deskBody");
const deskMoreEl = document.getElementById("deskMore");
const deskMoreUpEl = document.getElementById("deskMoreUp");
function updateDeskMore(){
  if(!deskMoreEl || !deskBodyEl) return;
  const collapsed = floatDesk.classList.contains("collapsed");
  const mobile = isMobileView();
  const canDown = (deskBodyEl.scrollHeight - deskBodyEl.scrollTop - deskBodyEl.clientHeight) > 8;
  const canUp   = deskBodyEl.scrollTop > 8;
  const showDown = !collapsed && mobile && canDown;
  const showUp   = !collapsed && mobile && canUp;
  if(showDown) deskMoreEl.style.bottom = "10px";       // パネル下端の少し上
  deskMoreEl.classList.toggle("show", showDown);
  if(deskMoreUpEl){
    if(showUp) deskMoreUpEl.style.top = ((deskBar ? deskBar.offsetHeight : 30) + 4) + "px";   // バーのすぐ下＝本文の上端
    deskMoreUpEl.classList.toggle("show", showUp);
  }
}
if(deskBodyEl){
  deskBodyEl.addEventListener("scroll", updateDeskMore, {passive:true});
  deskMoreEl.addEventListener("click", ()=> deskBodyEl.scrollBy({top:deskBodyEl.clientHeight*0.6, behavior:"smooth"}));
  if(deskMoreUpEl) deskMoreUpEl.addEventListener("click", ()=> deskBodyEl.scrollBy({top:-deskBodyEl.clientHeight*0.6, behavior:"smooth"}));
}
window.addEventListener("resize", updateDeskMore);
if(window.visualViewport) window.visualViewport.addEventListener("resize", updateDeskMore);

/* 大きく描く：表示だけ1.5倍（内部解像度・保存サイズは不変）。座標は表示サイズ基準なので描画はそのまま */
const bigBtn = document.getElementById("bigBtn");
function setBig(on){
  canvasScale = on ? 1.5 : 1;
  floatDesk.classList.toggle("big", on);
  bigBtn.classList.toggle("active", on);
  LS.set("fg_big", on ? "1" : "0");
  requestAnimationFrame(()=>{ updateDeskMore(); reclampDesk(); });   // 高さ・幅が変わるので合図更新＆はみ出し補正
}
bigBtn.addEventListener("click", ()=> setBig(!floatDesk.classList.contains("big")));
if(LS.get("fg_big")==="1") setBig(true);    // 前回の設定を引き継ぐ

/* 初回ガイド：画面中央で点滅 → 左上の「半紙を広げる」バーへスッと移動 → 短く点滅して消える */
function runGuide(){
  const guide = document.getElementById("guide");
  if(!guide || !floatDesk.classList.contains("collapsed") || LS.get("fg_guideSeen")){ floatDesk.classList.remove("guiding"); return; }
  LS.set("fg_guideSeen", "1");               // 端末ごとに初回だけ
  navGuideArmed = true; navGuideStarted = false;  // 見る動線も中央→右下へ飛ばす（半紙が来たら作動）
  tryNavGuide();                             // 既に半紙が読み込まれていればこの場で発火
  floatDesk.classList.add("guiding");        // 中央表示中は左上の実バーを隠す
  guide.style.left = (window.innerWidth/2) + "px";
  guide.style.top  = (window.innerHeight/2) + "px";
  guide.style.transform = "translate(-50%,-50%)";
  guide.classList.add("show");
  let done = false;
  const reveal = ()=> floatDesk.classList.remove("guiding");   // 実バーを出す
  const finish = ()=>{ if(done) return; done = true; reveal(); guide.classList.remove("show"); setTimeout(()=>guide.remove(), 450); };
  guide.addEventListener("click", ()=>{ setDeskCollapsed(false); stopNavHint(); finish(); });   // 描くを選択
  const CENTER_DWELL = 1500, MOVE = 800, LINGER = 600;
  setTimeout(()=>{                            // 左上へ移動
    if(done) return;
    const r = floatDesk.getBoundingClientRect();
    guide.style.left = r.left + "px";
    guide.style.top  = r.top + "px";
    guide.style.transform = "translate(0,0)";
  }, CENTER_DWELL);
  setTimeout(reveal, CENTER_DWELL + MOVE);     // 到着で実バーをフェードイン
  setTimeout(finish, CENTER_DWELL + MOVE + LINGER);
}

/* ---------- init ---------- */
setupCanvas();
restoreDraft();   // 前回の描きかけがあれば復帰
window.addEventListener("load", ()=> requestAnimationFrame(()=>setupCanvas()));   // レイアウト確定後にもう一度（初期化が表示前に走った場合の保険）
// デフォルトの太さ／筆：前回の設定があれば引き継ぐ。無ければランダム（太さは0〜15%）
(function(){
  const sl = document.getElementById("size");
  const savedPos = LS.get("fg_sizePos"), savedBrush = LS.get("fg_brush");
  const pos = (savedPos!=null && !isNaN(+savedPos)) ? clamp(Math.round(+savedPos),0,SIZE_STEPS-1) : Math.floor(Math.random()*3); // 既定は細めの段をランダム
  sl.value = pos;
  size = sizeFromPos(pos);
  brushType = ["taper","round","flat"].includes(savedBrush) ? savedBrush : ["taper","round","flat"][Math.floor(Math.random()*3)];
  document.querySelectorAll(".brush-opt").forEach(o=> o.classList.toggle("active", o.dataset.brush===brushType));
})();
if (document.fonts && document.fonts.load) { document.fonts.load('700 20px "Shippori Mincho"').catch(()=>{}); }
computeZoomMin();
applyZoom();
setDeskCollapsed(true);   // 初期状態は閉じる（PC・モバイルとも）
floatDesk.classList.add("guiding");   // ガイドが中央にいる間は左上バーを隠す（runGuideで到着時に表示）
requestAnimationFrame(()=>{ randomStartScroll(); drawMinimap(); });

/* ---------- 同時接続100枠の節約：放置・裏タブは自動で接続を解放、操作/再表示で再接続 ---------- */
const IDLE_MS = 4*60*1000;     // 4分操作がなければ切断
let dbOnline = true, idleTimer = 0, hiddenTimer = 0;
function goIdleOffline(){
  if(!db || IS_LOCAL || !dbOnline) return;
  if(admin) return;   // 運営タブは満員監視のため接続を維持（自動切替のため）
  dbOnline = false;
  try{ goOffline(db); }catch(e){}   // RTDB接続を解放（リスナーは残り、再接続で同期し直す）
}
function wakeOnline(){
  if(!db || IS_LOCAL) return;
  if(!dbOnline){ dbOnline = true; try{ goOnline(db); }catch(e){} }   // 触ったら再接続
  clearTimeout(idleTimer);
  idleTimer = setTimeout(goIdleOffline, IDLE_MS);
}
["pointerdown","keydown","wheel","touchstart"].forEach(ev=> window.addEventListener(ev, wakeOnline, {passive:true}));
if(scrollEl) scrollEl.addEventListener("scroll", wakeOnline, {passive:true});
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden){ clearTimeout(hiddenTimer); hiddenTimer = setTimeout(goIdleOffline, 25000); }  // 裏タブは25秒で解放
  else { clearTimeout(hiddenTimer); wakeOnline(); }
});

/* ---------- 認証：全員まず匿名サインイン。運営はメール/パスワードで本人だけ ---------- */
function startBoard(){ if(authStarted) return; authStarted = true; listen(); wakeOnline(); }
if(auth && !IS_LOCAL){
  onAuthStateChanged(auth, user=>{
    myUid = user ? user.uid : null;
    admin = !!(user && !user.isAnonymous && user.uid === ADMIN_UID);   // 本人UIDのみ運営
    if(!user){ signInAnonymously(auth).catch(e=>{ console.error(e); showAuthError(); }); return; }
    startBoard();          // 認証できた時だけ購読を開始（ルールが auth!=null を要求）
    render(); updateGearLabel();
  });
  signInAnonymously(auth).catch(e=>{ console.error(e); showAuthError(); });
} else if(IS_LOCAL){
  showAuthError();         // ローカルは共有不可の穏やかな案内のみ（描画の試用は可能）
} else {
  showConnError();
}
setTimeout(runGuide, 450);   // 初回ガイド通知
</script>
