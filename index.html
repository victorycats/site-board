<style>
  :root{
    --sumi:#1a1714;
    --paper:#f7f4ec;
    --paper-edge:#e6ddc8;
    --shu:#b5341f;
    --shu-deep:#8c2414;
    --wall:#6f5a44;
    --wall-dark:#5a4836;
    --ink-faint:#6b5d4a;
    --gold:#c9a227;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:"Zen Kaku Gothic New",sans-serif;
    color:var(--sumi);
    background:#e7ddc6;
  }

  .stage{position:relative;width:100vw;height:100vh;height:100dvh;overflow:hidden;-webkit-user-select:none;user-select:none}
  .stage img{-webkit-user-drag:none;user-drag:none;pointer-events:none}
  input,textarea{-webkit-user-select:text;user-select:text}

  /* floating title（左下・⚙跡地） */
  .float-header{
    position:absolute;left:16px;bottom:14px;z-index:14;
    text-align:left;pointer-events:none;
  }
  .title{
    font-family:"Yuji Syuku",serif;
    font-size:clamp(18px,4vw,27px);
    color:var(--sumi);
    letter-spacing:.02em;
    text-shadow:1px 2px 0 rgba(255,255,255,.4);
    line-height:1.1;
  }
  .title .shu{color:var(--shu)}
  .subtitle{
    font-family:"Shippori Mincho",serif;
    color:var(--ink-faint);
    margin-top:6px;font-size:13px;letter-spacing:.16em;
    text-shadow:0 1px 0 rgba(255,255,255,.4);
  }
  .seal{
    display:inline-flex;align-items:center;justify-content:center;margin-left:6px;
    width:22px;height:22px;cursor:pointer;pointer-events:auto;
    background:#2f7d3b;border-radius:4px;
    vertical-align:middle;transform:rotate(-4deg);box-shadow:0 1px 0 rgba(0,0,0,.3);
    transition:transform .12s, filter .12s;
  }
  .seal:hover{filter:brightness(1.08);transform:rotate(-4deg) scale(1.08)}
  .seal:active{transform:rotate(-4deg) scale(.94)}
  .seal svg{width:14px;height:14px;display:block}

  /* floating tools (zoom + status) top-right */
  .float-tools{
    position:absolute;top:14px;right:14px;z-index:22;
    display:flex;flex-direction:column;align-items:flex-end;gap:8px;
    background:rgba(26,23,20,.5);backdrop-filter:blur(3px);
    padding:10px 12px;border-radius:12px;
    box-shadow:0 4px 14px rgba(0,0,0,.35);
    touch-action:none;
  }
  .float-tools.dragging,.nav-cluster.dragging{opacity:.92}
  .drag-grip{
    align-self:flex-end;cursor:move;touch-action:none;user-select:none;
    color:#e9dcc0;opacity:.65;font-size:12px;line-height:1;letter-spacing:2px;
    padding:1px 7px;border-radius:6px;background:rgba(26,23,20,.4);
  }
  .drag-grip:hover{opacity:1}
  .float-tools .status{font-size:12px;color:#e9dcc0;display:flex;align-items:center;gap:8px}
  .remain{font-size:11px;font-weight:700}
  .remain.warn{color:#ffd27a}
  .remain.full{color:#ff8a72}

  /* floating message (placing/empty/admin/err) top-center */
  .float-msg{
    position:absolute;top:74px;left:50%;transform:translateX(-50%);
    z-index:18;width:min(560px,calc(100vw - 32px));pointer-events:none;
  }
  .float-msg *{pointer-events:auto}
  .float-msg:empty{display:none}

  /* floating 半紙 panel */
  .float-desk{
    position:absolute;top:14px;left:14px;z-index:20;
    width:330px;max-width:calc(100vw - 36px);
    max-height:calc(100dvh - 28px);
    display:flex;flex-direction:column;
    background:linear-gradient(150deg,#efe6cf,#e5d7b4);
    border-radius:10px;
    box-shadow:0 8px 22px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.35);
    overflow:hidden;
    transition:opacity .4s;
  }
  .float-desk.guiding{opacity:0;pointer-events:none}
  .desk-bar{
    display:flex;align-items:center;justify-content:flex-start;gap:8px;
    padding:5px 10px 3px;flex:0 0 auto;
    cursor:move;touch-action:none;user-select:none;-webkit-user-select:none;
  }
  .desk-bar.dragging{cursor:grabbing}
  .desk-bar-title{
    font-family:"Shippori Mincho",serif;font-weight:700;font-size:14px;
    letter-spacing:.1em;color:var(--ink-faint);
    display:flex;align-items:center;gap:8px;margin-right:auto;
  }
  .desk-bar-title::before{content:none}
  .desk-reset{
    width:26px;height:26px;border-radius:7px;border:none;cursor:pointer;
    background:#d8c8a2;color:var(--ink-faint);font-size:15px;font-weight:700;line-height:1;
    display:flex;align-items:center;justify-content:center;padding:0;flex:0 0 auto;
  }
  .desk-reset:hover{filter:brightness(1.04)}
  .desk-reset:active{transform:rotate(-90deg)}
  .desk-toggle{
    width:26px;height:26px;border-radius:7px;border:none;cursor:pointer;
    background:#d8c8a2;color:var(--ink-faint);font-size:18px;font-weight:700;line-height:1;
    display:flex;align-items:center;justify-content:center;padding:0;
  }
  .desk-toggle:hover{filter:brightness(1.04)}
  .desk-orient{
    margin-left:0;height:26px;min-width:30px;padding:0 9px;border-radius:7px;border:none;cursor:pointer;
    background:#d8c8a2;color:var(--ink-faint);font-size:13px;font-weight:700;line-height:1;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;
  }
  .desk-orient:hover{filter:brightness(1.04)}
  .desk-orient.active{background:var(--shu);color:#fff}
  /* body.touch でも向きボタンは出す（試験的：端末の向きに加えて手動でも切替可） */
  .desk-body{padding:0 10px 0;overflow-x:hidden;overflow-y:auto;min-height:0;flex:1 1 auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .desk-body::-webkit-scrollbar{display:none}   /* スクロールバーで右側に段差(へこみ)が出ないように隠す（合図は▼で表示） */
  .float-desk.collapsed .desk-body{display:none}
  .float-desk.collapsed{width:auto;max-width:none}
  .float-desk.collapsed .desk-bar{padding-bottom:10px}
  .float-desk.big{width:495px}
  .float-desk.land{width:min(520px, calc(100vw - 24px))}                                  /* 大きく描く：表示のみ1.5倍 */
  .float-desk.land.big{width:min(760px, calc(100vw - 24px))}                              /* 横向きで「拡」：横の幅をさらに広げて大きく描く */
  @media(max-width:560px){
    .float-desk.big{width:min(450px, calc(100vw - 24px))}
  }
  @media(max-width:560px){
    .float-desk{width:min(300px,calc(100vw - 24px));left:12px;top:14px;max-height:calc(100dvh - 28px)}
    .float-tools .zoom-ctl input[type=range]{display:none}  /* モバイルは幅広スライダーだけ隠す（＋／−と％は残す） */
    .float-tools{padding:7px 11px}
  }
  /* 横半紙（手動の「横」ボタン）×タッチ端末×画面が横長：モーダルをほぼ全画面・2カラム（左＝半紙が高さいっぱい／右＝道具＋貼る）。縦持ちでは発動させない（縦レイアウトのまま横半紙を収める） */
  @media (orientation: landscape){
  body.touch .float-desk.land:not(.collapsed){
    position:fixed; inset:6px; left:6px; top:6px; width:auto; max-width:none; max-height:none; border-radius:10px;
  }
  body.touch .float-desk.land:not(.collapsed) .desk-bar{ padding:4px 8px 3px; }
  body.touch .float-desk.land:not(.collapsed) .desk-body{
    display:grid; grid-template-columns:1fr minmax(150px,190px); grid-template-rows:1fr auto;
    column-gap:10px; padding:0 8px 6px; overflow:hidden; min-height:0;
  }
  body.touch .float-desk.land:not(.collapsed) .canvas-frame{
    grid-row:1 / span 2; grid-column:1; margin:0; padding:4px;
    display:flex; align-items:center; justify-content:center; min-height:0; min-width:0;
  }
  body.touch .float-desk.land:not(.collapsed) .canvas-frame::before{ inset:4px; }
  body.touch .float-desk.land:not(.collapsed) .canvas-frame #pad{
    height:100%; width:auto; max-width:100%;   /* 高さいっぱい・幅はアスペクト（.landで3:2） */
  }
  body.touch .float-desk.land:not(.collapsed) .tools{
    grid-column:2; grid-row:1; margin:0; padding:0; overflow-y:auto; min-height:0; -webkit-overflow-scrolling:touch;
  }
  body.touch .float-desk.land:not(.collapsed) .desk-foot{
    grid-column:2; grid-row:2; margin:0; padding:6px 0 0; background:transparent; border-top:1px solid rgba(140,110,60,.25);
  }
  body.touch .float-desk.land:not(.collapsed) .desk-more{ display:none !important; }  /* 2カラムは縦スクロール合図不要 */
  body.touch .float-desk.land:not(.collapsed) #bigBtn{ display:none; }                /* 2カラムは幅拡大が効かないので「拡」を隠す */
  }
  /* 横半紙＋狭い画面（縦持ちスマホ等）：横幅が既に上限で「拡」は効かないので隠す */
  @media (max-width: 544px){
    .float-desk.land #bigBtn{ display:none; }
  }
  .canvas-frame{
    background:var(--paper);
    padding:5px;
    border-radius:5px;
    box-shadow:inset 0 0 0 1px var(--paper-edge), inset 0 0 14px rgba(150,120,70,.14);
    position:relative;
    flex:0 0 auto;
  }
  /* 8 x 12 cm => 2 : 3 */
  .canvas-frame::before{
    content:"";position:absolute;inset:5px;
    border:1px dashed rgba(140,110,60,.30);
    border-radius:3px;pointer-events:none;
  }
  .float-desk.land #pad{aspect-ratio:3/2}
  #pad{
    display:block;width:100%;
    aspect-ratio:2/3;
    border-radius:3px;
    touch-action:none;
    cursor:crosshair;
  }

  .tools{margin-top:6px;padding:6px 6px 0}
  /* 貼るボタンはスクロール外に常時固定（iOSでスクロールバーが出なくても見える） */
  .desk-foot{
    margin:6px -10px 0;padding:8px 10px 10px;
    background:#e7d9bb;
    border-top:1px solid rgba(140,110,60,.30);
  }
  .desk-foot .name-field{margin-bottom:6px}
  /* もっと下に道具がある合図（モバイルでスクロール可能かつ最下部でない時だけ） */
  .desk-more{
    position:absolute;left:50%;transform:translateX(-50%);z-index:3;
    display:none;align-items:center;justify-content:center;
    width:40px;height:40px;border-radius:50%;
    background:rgba(231,217,187,.96);color:var(--ink-faint);
    font-size:17px;line-height:1;cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,.28), inset 0 0 0 1px rgba(140,110,60,.35);
    animation:deskMoreBob 1.4s ease-in-out infinite;
  }
  .desk-more::before{content:"";position:absolute;inset:-10px;border-radius:50%}  /* タップ判定を上下左右+10px広げる（見た目は変えない） */
  .desk-more.show{display:flex}
  .desk-more.up{animation:deskMoreBobUp 1.4s ease-in-out infinite}   /* ▲は上向きにふわふわ */
  @keyframes deskMoreBob{0%,100%{margin-top:0}50%{margin-top:3px}}
  @keyframes deskMoreBobUp{0%,100%{margin-top:0}50%{margin-top:-3px}}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .swatch{
    width:30px;height:30px;border-radius:50%;
    border:2px solid rgba(0,0,0,.15);
    cursor:pointer;position:relative;
  }
  .swatch.active{border-color:var(--sumi);box-shadow:0 0 0 2px var(--paper),0 0 0 4px var(--sumi)}
  .swatch.active::after{content:"";position:absolute;inset:0;border-radius:50%}
  /* 色パレット：折り返さず横1列。入りきらない分は横スクロール、右端に矢印ヒント */
  #colors{position:relative;flex-wrap:nowrap;gap:6px}
  .swatch-wrap{position:relative;flex:1 1 auto;min-width:0;display:flex}
  .swatch-scroll{
    display:flex;align-items:center;gap:6px;
    flex:1 1 auto;min-width:0;
    overflow-x:auto;overflow-y:hidden;
    scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;
    padding:7px 4px;     /* 上下＝選択リング(4px)が切れない余白／左右＝端の色のリング分 */
  }
  .swatch-scroll::-webkit-scrollbar{display:none}
  .swatch-scroll .swatch{flex:0 0 auto}
  .swatch-more{
    position:absolute;top:0;bottom:0;width:26px;
    display:none;align-items:center;justify-content:center;z-index:2;
    color:var(--ink-faint);font-size:13px;font-weight:700;cursor:pointer;
  }
  .swatch-more.right{right:0;border-radius:0 10px 10px 0;background:linear-gradient(to right, rgba(233,221,194,0), #e9ddc2 60%)}
  .swatch-more.left{left:0;border-radius:10px 0 0 10px;background:linear-gradient(to left, rgba(233,221,194,0), #e9ddc2 60%)}
  .swatch-more.show{display:flex}
  @media(max-width:560px){
    /* モバイルで色パレットを一回り小さく（横スクロール前提でも見やすく） */
    #colors{gap:6px}
    #colors .tool-label{min-width:24px}
    #colors .swatch{width:24px;height:24px;border-width:1px}
    .swatch-scroll{gap:6px}
  }
  .tool-label{font-size:12px;color:var(--ink-faint);font-weight:500;min-width:24px}
  .brush-seg{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid rgba(140,110,60,.35);flex:1}
  .brush-opt{
    flex:1;border:none;cursor:pointer;background:transparent;color:var(--ink-faint);
    font-family:"Shippori Mincho",serif;font-weight:700;font-size:13px;letter-spacing:.08em;
    padding:7px 4px;
  }
  .brush-opt + .brush-opt{border-left:1px solid rgba(140,110,60,.35)}
  .brush-opt.active{background:var(--shu);color:var(--paper)}
  .brush-opt:not(.active):hover{background:rgba(181,52,31,.1)}
  input[type=range]{flex:1;accent-color:var(--sumi)}
  .size-wrap{flex:1;display:flex;flex-direction:column;gap:1px}
  .size-wrap input[type=range]{flex:none;width:100%}
  .size-dots{position:relative;height:7px}
  .size-dots i{position:absolute;top:1px;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--sumi);opacity:.75}

  .name-field{
    width:100%;
    font-family:"Zen Kaku Gothic New",sans-serif;
    font-size:14px;
    padding:9px 11px;
    border:1px solid var(--paper-edge);
    border-radius:7px;
    background:#fbf6e8;
    color:var(--sumi);
    margin-bottom:10px;
  }
  .name-field:focus{outline:none;border-color:var(--shu)}

  .btns{display:flex;gap:8px;flex-wrap:wrap}
  button{
    font-family:"Zen Kaku Gothic New",sans-serif;
    cursor:pointer;border:none;border-radius:8px;
    font-size:14px;font-weight:500;padding:11px 14px;
    transition:transform .08s, filter .15s;
  }
  button:active{transform:scale(.97)}
  .btn-ghost{
    flex:1 1 64px;min-width:0;padding:11px 8px;font-size:13px;
    background:#e2d4b2;color:var(--ink-faint);
    box-shadow:inset 0 0 0 1px rgba(140,110,60,.25);
  }
  .btn-ghost:hover{filter:brightness(1.04)}
  .btn-ghost.active{background:var(--shu);color:var(--paper);box-shadow:inset 0 0 0 1px var(--shu)}
  /* カラーパレットより上のアクション群：高さ控えめ・等幅5ボタン */
  .btns-act{gap:6px;margin-bottom:12px}
  .btns-act .btn-ghost{flex:1 1 0;padding:7px 4px;font-size:13px;border-radius:7px}
  .btn-post{
    flex:1;
    background:var(--shu);color:var(--paper);
    font-family:"Shippori Mincho",serif;font-weight:700;
    letter-spacing:.25em;font-size:16px;
    box-shadow:0 3px 0 var(--shu-deep);
  }
  .btn-post:hover{filter:brightness(1.06)}
  .btn-post:active{transform:translateY(2px);box-shadow:0 1px 0 var(--shu-deep)}
  .btn-post:disabled{opacity:.5;cursor:default;box-shadow:0 3px 0 var(--shu-deep)}

  .hint{font-size:11px;color:var(--ink-faint);opacity:.75;margin-top:9px;line-height:1.6}

  /* ---- seal (落款) on the 半紙：書き出しと同じふたば朱印PNGをプレビュー ---- */
  .seal-stamp{
    position:absolute;right:6%;bottom:4%;z-index:3;
    width:27%;aspect-ratio:1;pointer-events:none;opacity:.92;
  }
  .float-desk.land .seal-stamp{width:auto;height:27%;right:4%;bottom:6%}   /* 横向きは短辺(高さ)基準でサイズ＝でかすぎ防止 */
  .seal-stamp img{width:100%;height:100%;display:block}
  @media(max-width:560px){
    /* 半紙を開いている間は、めぐり・ミニマップ・板のズームを隠す（描画に集中） */
    .stage.desk-open .float-tools,
    .stage.desk-open .nav-cluster{display:none}
  }

  /* ---- wide wall / board ---- */
  .live-dot{width:8px;height:8px;border-radius:50%;background:#7bd66a;box-shadow:0 0 0 0 rgba(123,214,106,.7);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(123,214,106,.6)}70%{box-shadow:0 0 0 8px rgba(123,214,106,0)}100%{box-shadow:0 0 0 0 rgba(123,214,106,0)}}

  #msg:not(:empty){margin-bottom:12px}
  .placing-hint{
    background:rgba(140,36,20,.94);border:1px solid var(--shu-deep);color:#fff5ef;
    padding:9px 15px;border-radius:8px;font-size:13px;font-family:"Shippori Mincho",serif;
    letter-spacing:.05em;display:flex;align-items:center;justify-content:space-between;gap:10px;
    box-shadow:0 6px 16px rgba(0,0,0,.3);animation:pulse2 1.6s infinite;
  }
  .placing-hint .cancel{cursor:pointer;text-decoration:underline;white-space:nowrap;flex:0 0 auto}
  @keyframes pulse2{50%{background:rgba(181,52,31,.94)}}

  .wall-scroll{
    overflow:auto;
    position:absolute;inset:0;
    height:100%;width:100%;
    border-radius:0;
    background:#e7ddc6;
    -webkit-overflow-scrolling:touch;
    cursor:grab;
    touch-action:pan-x pan-y;
    scrollbar-width:thin;
    scrollbar-color:#a7402b #d8cdb2;
  }
  .wall-scroll.grabbing{cursor:grabbing}
  .wall-scroll.placing-lock{touch-action:none}   /* 配置中はスクロールを止め、指でゴーストを動かす */
  .wall-scroll::-webkit-scrollbar{width:13px;height:13px}
  .wall-scroll::-webkit-scrollbar-track{background:#d8cdb2}
  .wall-scroll::-webkit-scrollbar-thumb{
    background:#a7402b;border-radius:8px;border:3px solid #d8cdb2;
  }
  .wall-scroll::-webkit-scrollbar-thumb:hover{background:var(--shu)}
  .wall-scroll::-webkit-scrollbar-corner{background:#d8cdb2}
  .wall-sizer{position:relative;}
  .wall{
    position:absolute;top:0;left:0;
    width:6000px;height:2200px;
    transform-origin:top left;
    background:
      repeating-linear-gradient(90deg, rgba(90,70,40,.045) 0 1px, transparent 1px 28px),
      linear-gradient(155deg,#f3ecdc,#e7ddc6);
  }
  .wall.placing{cursor:copy}
  .wall.placing #notes{pointer-events:none}
  .wall::after{
    content:"";position:absolute;left:0;right:0;top:50%;height:2px;z-index:-1;  /* 半紙の背面へ */
    background:repeating-linear-gradient(90deg, rgba(90,70,40,.13) 0 16px, transparent 16px 32px);
    pointer-events:none;
  }

  /* zoom control */
  .zoom-ctl{display:flex;align-items:center;gap:8px;color:#e9dcc0;font-size:12px}
  .zoom-ctl input[type=range]{width:120px;accent-color:var(--shu)}
  .zoom-ctl .zbtn{
    width:26px;height:26px;border-radius:6px;background:rgba(0,0,0,.28);color:var(--paper);
    display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;line-height:1;
  }
  .zoom-ctl .zbtn:hover{background:rgba(0,0,0,.45)}
  .zoom-ctl .zval{min-width:42px;text-align:right;font-weight:700}

  .note{
    position:absolute;width:104px;
    background:var(--paper);
    padding:6px 6px 7px;
    border-radius:3px;
    box-shadow:0 7px 16px rgba(0,0,0,.4);
    display:flex;flex-direction:column;
    transform-origin:50% 50%;
    animation:drop .45s cubic-bezier(.2,.9,.3,1.2) both;
    content-visibility:auto;contain-intrinsic-size:104px 196px;   /* 画面外は描画スキップ */
  }
  .note.land{content-visibility:auto;contain-intrinsic-size:160px 150px}
  .note.no-anim{animation:none}
  .note.mine{outline:2px solid var(--gold);outline-offset:2px;z-index:20}
  .note.is-hidden{opacity:.55;outline:2px dashed var(--shu);outline-offset:2px}
  .note img{display:block;width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:2px;background:#fff}
  .note.land{width:160px}
  .note.land img{aspect-ratio:3/2}
  .note .imgwrap{position:relative}
  /* 読み込み前の空半紙（うっすら和紙色）。読めたらふわっと表示 */
  .note .note-img{
    width:100%;aspect-ratio:2/3;border-radius:2px;
    background:repeating-linear-gradient(0deg,#fbf8f0,#fbf8f0 7px,#f4eede 7px,#f4eede 8px);
    opacity:0;transition:opacity .3s;
  }
  .note .note-img.ready{opacity:1;background:#fff}
  .note .tape{
    position:absolute;top:-9px;left:50%;transform:translateX(-50%) rotate(var(--r,-3deg));
    width:48px;height:18px;
    background:rgba(216,201,168,.62);
    box-shadow:0 1px 3px rgba(0,0,0,.2);z-index:2;
  }
  /* 反転（180°）した半紙はテープを反対の端へ＝画面上では上側に来る */
  .note.flipped .tape{top:auto;bottom:-9px}
  .note .tape{transition:opacity .3s ease, transform .4s cubic-bezier(.2,.85,.3,1.45)}
  .note.rotoring .tape{opacity:0;transform:translateX(-50%) rotate(var(--r,-3deg)) scale(.2)}  /* 回転中は隠し、確定後に生える */
  .note.snapping{transition:transform .3s cubic-bezier(.25,.9,.35,1.2)}                          /* ぐるん／落ち着き */
  .note .who{
    font-size:10px;color:var(--ink-faint);
    text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    font-family:"Shippori Mincho",serif;margin:4px 2px 4px;
  }
  .note .acts{display:flex;align-items:center;gap:3px;margin-top:auto;flex-wrap:wrap}
  .sou-btn{
    flex:1;min-width:0;display:flex;align-items:center;justify-content:center;gap:2px;white-space:nowrap;
    background:#efe3c4;color:var(--ink-faint);
    border-radius:5px;padding:4px 3px;font-size:10px;font-weight:700;
    box-shadow:inset 0 0 0 1px rgba(140,110,60,.2);
  }
  .sou-btn .n{color:var(--shu-deep);display:inline-block}
  .sou-btn.done{background:#f3d9c9;color:var(--shu-deep);box-shadow:inset 0 0 0 1px var(--shu)}
  .sou-btn:hover{filter:brightness(1.04)}
  .sou-btn.pop .n{animation:souPop .45s ease-out}
  @keyframes souPop{0%{transform:scale(1)}35%{transform:scale(1.55);color:var(--shu)}100%{transform:scale(1)}}
  .del-btn{
    background:rgba(181,52,31,.06);color:#9c7f5e;font-size:11px;font-weight:700;
    padding:5px 9px;border-radius:5px;letter-spacing:.06em;
    box-shadow:inset 0 0 0 1px rgba(181,52,31,.22);
  }
  .del-btn:hover{background:rgba(181,52,31,.14);color:var(--shu-deep)}
  .del-btn.done{color:#c9b48f;cursor:default;box-shadow:inset 0 0 0 1px rgba(140,110,60,.2)}
  .repo-btn{
    background:rgba(47,125,59,.10);color:#2f7d3b;font-size:11px;font-weight:700;
    padding:5px 9px;border-radius:5px;letter-spacing:.04em;
    box-shadow:inset 0 0 0 1px rgba(47,125,59,.38);
  }
  .repo-btn:hover{background:rgba(47,125,59,.18)}
  .repo-btn.undo-send{background:rgba(140,110,60,.10);color:#8a6e3c;box-shadow:inset 0 0 0 1px rgba(140,110,60,.42)}
  .repo-btn.undo-send:hover{background:rgba(140,110,60,.2)}
  .note .acts .repo-btn{opacity:1}   /* 位置直しは自分の最新半紙だけ。常にはっきり表示 */
  /* 選択中（最前面）の半紙だけボタンが効く。非選択はボタンを淡色＝押せない見た目に */
  .note .acts button{opacity:.45;transition:opacity .15s}
  .note.sel .acts button, .note.mine .acts button{opacity:1}
  .note.sel{outline:2px solid rgba(181,52,31,.55);outline-offset:2px;border-radius:3px}
  .admin-line{
    display:flex;align-items:center;gap:4px;margin-top:6px;flex-wrap:wrap;
    font-size:9px;color:var(--ink-faint);
    border-top:1px dashed rgba(140,110,60,.3);padding-top:5px;
  }
  .admin-line .stat{background:#e8dcbb;border-radius:4px;padding:2px 5px}
  .admin-line .stat.warn{background:#f0cdbf;color:var(--shu-deep)}
  .mini{font-size:9px;padding:3px 7px;border-radius:5px;font-weight:700}
  .mini.restore{background:#d8e8cf;color:#2f5a23}
  .mini.del{background:#f0cdbf;color:var(--shu-deep)}
  .hidden-badge{
    position:absolute;top:6px;left:6px;z-index:2;
    background:var(--shu);color:var(--paper);font-size:9px;font-weight:700;
    padding:2px 5px;border-radius:3px;font-family:"Shippori Mincho",serif;
  }

  /* ghost preview while placing */
  .ghost{
    position:absolute;width:104px;pointer-events:none;display:none;z-index:30;
    opacity:.8;transform-origin:50% 0;filter:drop-shadow(0 8px 10px rgba(0,0,0,.4));
  }
  .ghost.show{display:block}
  .ghost img{display:block;width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:2px;background:var(--paper);padding:5px}
  .ghost.land{width:160px}
  .ghost.land img{aspect-ratio:3/2}
  /* 置けない位置（下の半紙が3割超隠れる）では半紙全体が赤っぽくなる */
  .ghost.blocked::after{content:"";position:absolute;inset:0;border-radius:3px;background:rgba(190,30,20,.5);pointer-events:none}
  .ghost.blocked{filter:drop-shadow(0 8px 10px rgba(0,0,0,.4)) drop-shadow(0 0 3px rgba(190,30,20,.9))}

  /* angle adjust bar (floating bottom-center) */
  /* PC: 半紙中央を軸にした円形ダイヤルの回転スライダー */
  .rotor{position:fixed;z-index:55;display:none;touch-action:none;cursor:grab}
  .rotor.show{display:block}
  .rotor:active{cursor:grabbing}
  .rotor svg{display:block;overflow:visible;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
  .rotor #rotorHandle{cursor:grab}
  .rotor-cancel{
    position:absolute;left:50%;top:0;transform:translateX(-50%);
    font-size:13px;line-height:1;padding:6px 14px;border-radius:999px;
    background:#e7d9bb;color:var(--ink-faint);font-family:"Zen Kaku Gothic New",sans-serif;
    box-shadow:0 2px 6px rgba(0,0,0,.3), inset 0 0 0 1px rgba(140,110,60,.4);
    cursor:pointer;user-select:none;white-space:nowrap;
  }
  .rotor-cancel:hover{filter:brightness(1.05)}
  /* 運営ログイン（メール＋パスワード同時入力） */
  .login-mask{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:rgba(26,23,20,.5);backdrop-filter:blur(3px);padding:20px}
  .login-mask.show{display:flex}
  .login-card{width:min(320px,calc(100vw - 40px));background:var(--paper);border-radius:14px;padding:18px 16px;box-shadow:0 14px 40px rgba(0,0,0,.4), inset 0 0 0 1px var(--paper-edge);display:flex;flex-direction:column;gap:10px}
  .login-title{font-weight:700;color:var(--sumi);text-align:center;letter-spacing:.08em;margin-bottom:2px}
  .login-card input{width:100%;box-sizing:border-box;padding:10px 12px;border-radius:9px;border:1px solid var(--paper-edge);background:#fffdf7;color:var(--sumi);font-size:16px}
  .login-card input:focus{outline:none;border-color:var(--shu)}
  .login-btns{display:flex;gap:8px;margin-top:4px}
  .login-btns button{flex:1;padding:10px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:14px}
  .login-cancel{background:#e3d8c0;color:var(--ink-faint)}
  .login-ok{background:var(--shu);color:#fff}
  .login-ok:hover{background:var(--shu-deep)}
  /* 差し入れ・応援モーダル */
  .donate-card{width:min(400px,calc(100vw - 28px));max-height:calc(100dvh - 36px);overflow-y:auto}
  .kofi-frame{width:100%;height:600px;border:0;border-radius:10px;background:#fff;display:block}
  .donate-lead{font-size:13px;color:var(--ink-faint);text-align:center;line-height:1.65;margin:0 2px 2px}
  .donate-link{display:flex;align-items:center;gap:10px;text-decoration:none;padding:12px 14px;border-radius:10px;font-weight:700;font-size:14px;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.18)}
  .donate-link .donate-ic{font-size:18px;line-height:1}
  .donate-link.amazon{background:#ff9900;color:#3a2c12}
  .donate-link:hover{filter:brightness(1.05)}
  .donate-link:active{transform:scale(.98)}
  /* 色パレット編集 */
  #palSlots{display:flex;flex-direction:column;gap:8px}
  .pal-fixed{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--ink-faint)}
  .pal-chip{width:18px;height:18px;border-radius:50%;border:1px solid rgba(0,0,0,.15);display:inline-block;vertical-align:middle}
  .pal-slot{display:flex;align-items:center;gap:8px}
  .pal-slot input[type=color]{width:46px;height:34px;border:1px solid var(--paper-edge);border-radius:8px;background:#fffdf7;padding:2px;cursor:pointer}
  .pal-slot .pal-hex{flex:1;font-size:13px;color:var(--ink-faint);font-family:monospace}
  .pal-slot .pal-del{width:30px;height:30px;border:none;border-radius:7px;background:#e3d8c0;color:var(--ink-faint);cursor:pointer;font-weight:700;font-size:16px;line-height:1}
  .pal-add{background:#e7d9bb;color:var(--ink-faint);border:none;border-radius:9px;padding:9px;cursor:pointer;font-weight:700;font-size:13px}
  .pal-add:disabled{opacity:.4;cursor:default}
  .rotor-hint{
    position:absolute;left:50%;transform:translateX(-50%);
    white-space:nowrap;font-size:11px;font-family:"Zen Kaku Gothic New",sans-serif;
    color:#6b5a3f;background:rgba(245,238,222,.92);padding:3px 10px;border-radius:999px;
    box-shadow:0 2px 6px rgba(0,0,0,.2), inset 0 0 0 1px rgba(140,110,60,.3);pointer-events:none;
  }
  /* 初回ガイド：中央で点滅→左上のバー位置へ移動 */
  .guide{
    position:fixed;z-index:80;
    display:flex;align-items:center;gap:10px;
    padding:13px 20px;border-radius:13px;
    background:linear-gradient(150deg,#efe6cf,#e5d7b4);
    color:var(--ink-faint);
    font-family:"Shippori Mincho",serif;font-weight:700;font-size:16px;white-space:nowrap;
    box-shadow:0 12px 32px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.4);
    opacity:0;pointer-events:none;cursor:pointer;
    transition:left .8s cubic-bezier(.85,0,.12,1), top .8s cubic-bezier(.85,0,.12,1), transform .8s cubic-bezier(.85,0,.12,1), opacity .4s;
  }
  .guide .g-plus{
    width:24px;height:24px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:var(--shu);color:#fff;font-size:17px;line-height:1;
  }
  .guide.show{opacity:1;pointer-events:auto;animation:guidePulse 1s ease-in-out infinite}
  @keyframes guidePulse{
    0%,100%{box-shadow:0 12px 32px rgba(0,0,0,.45), 0 0 0 0 rgba(181,52,31,0)}
    50%{box-shadow:0 12px 32px rgba(0,0,0,.45), 0 0 0 7px rgba(181,52,31,.30)}
  }

  /* nav cluster: 半紙めぐり + ミニマップ */
  .nav-cluster{
    position:fixed;right:14px;bottom:14px;z-index:24;
    display:flex;flex-direction:column;align-items:flex-end;gap:8px;
    touch-action:none;
  }
  .meguri{
    display:flex;align-items:center;gap:6px;
    background:rgba(26,23,20,.55);backdrop-filter:blur(3px);
    padding:6px 8px;border-radius:10px;box-shadow:0 4px 12px rgba(0,0,0,.3);
  }
  .meguri button{
    width:36px;height:32px;border-radius:7px;border:none;cursor:pointer;
    background:#e3d7b8;color:var(--ink-faint);font-size:15px;font-weight:700;line-height:1;
    display:flex;align-items:center;justify-content:center;padding:0;
  }
  .meguri button:hover{filter:brightness(1.05)}
  .meguri button:active{transform:scale(.96)}
  .meguri.hint{animation:meguriHint 1.1s ease-in-out infinite}
  @keyframes meguriHint{
    0%,100%{box-shadow:0 4px 12px rgba(0,0,0,.3), 0 0 0 0 rgba(181,52,31,0)}
    50%{box-shadow:0 4px 12px rgba(0,0,0,.3), 0 0 0 7px rgba(181,52,31,.38)}
  }
  .meguri .lab{color:#e9dcc0;font-size:11px;font-family:"Shippori Mincho",serif;letter-spacing:.08em;padding:0 2px;white-space:nowrap}
  .fresh-badge{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:16px;height:16px;padding:0 4px;margin-left:5px;border-radius:9px;
    background:#fff;color:#b5341f;font-size:10px;font-weight:800;line-height:1;vertical-align:middle;
    box-shadow:0 0 6px rgba(255,255,255,.85);
  }
  .nav-cluster.has-fresh .meguri{box-shadow:0 0 0 2px rgba(255,255,255,.85),0 6px 16px rgba(0,0,0,.35)}
  .minimap{
    width:184px;background:linear-gradient(155deg,#f3ecdc,#e7ddc6);
    border:1px solid rgba(90,70,40,.4);border-radius:8px;overflow:hidden;
    box-shadow:0 6px 16px rgba(0,0,0,.35);cursor:pointer;touch-action:none;
  }
  .minimap canvas{display:block;width:184px;height:67px}
  @media(max-width:560px){
    .nav-cluster{right:10px;bottom:10px}
    .minimap{width:140px}
    .minimap canvas{width:140px;height:51px}
    .meguri button{width:42px;height:38px;font-size:16px}
  }

  .note.found{outline:3px solid var(--shu);outline-offset:2px;z-index:25;animation:foundpulse 1.5s ease-out forwards}
  @keyframes foundpulse{0%{outline-color:var(--shu)}70%{outline-color:var(--shu)}100%{outline-color:rgba(181,52,31,0)}}

  @keyframes drop{from{opacity:0;transform:translateY(-22px)}to{opacity:1}}

  /* admin bar */
  .gear{
    display:none;   /* 非表示。運営ログインは隠しコマンド（白紙＋名前欄enter＋投稿）から */
    position:fixed;left:16px;bottom:16px;z-index:40;
    width:42px;height:42px;border-radius:50%;
    background:rgba(26,23,20,.55);color:var(--paper);
    align-items:center;justify-content:center;font-size:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.4);
  }
  .gear:hover{background:rgba(26,23,20,.8)}
  .admin-banner{
    background:rgba(140,36,20,.94);
    border:1px solid var(--shu-deep);color:#fff5ef;
    padding:9px 14px;border-radius:8px;font-size:12px;
    font-family:"Shippori Mincho",serif;letter-spacing:.06em;
    box-shadow:0 6px 16px rgba(0,0,0,.3);
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }

  .empty,.loading{
    text-align:center;padding:48px 20px;
    color:var(--ink-faint);font-family:"Shippori Mincho",serif;
    background:rgba(255,255,255,.55);border-radius:12px;
  }
  .empty .big{font-size:40px;display:block;margin-bottom:14px;opacity:.45}
  .err{
    background:#fff;
    border:1px solid var(--shu);color:var(--shu-deep);
    padding:14px 16px;border-radius:8px;font-size:13px;line-height:1.7;
    box-shadow:0 6px 16px rgba(0,0,0,.2);
  }

  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--sumi);color:var(--paper);
    font-family:"Shippori Mincho",serif;letter-spacing:.1em;
    padding:11px 22px;border-radius:30px;font-size:14px;
    opacity:0;pointer-events:none;transition:.3s;z-index:60;
    box-shadow:0 6px 20px rgba(0,0,0,.4);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="stage">
  <div class="wall-scroll" id="wallScroll">
    <div class="wall-sizer" id="wallSizer">
      <div class="wall" id="wall">
        <div id="notes"></div>
        <div class="ghost" id="ghost"><img id="ghostImg" alt=""></div>
      </div>
    </div>
  </div>

  <header class="float-header">
    <div class="title">ふたば(<span class="shu">偽</span>)お習字<span class="seal" id="donateSeal" title="差し入れ・応援" role="button" tabindex="0"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21 C12 17, 12 14, 12 10.5" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round"/><path d="M12 12.5 C7.5 12.5, 4.5 9.5, 4.5 5.2 C9 5.2, 12 8.2, 12 12.5 Z" fill="#fff"/><path d="M12 12.5 C16.5 12.5, 19.5 9.5, 19.5 5.2 C15 5.2, 12 8.2, 12 12.5 Z" fill="#fff"/></svg></span></div>
    <div class="subtitle">本家が実装されたら即閉鎖</div>
  </header>

  <div class="float-tools">
    <div class="drag-grip" title="ドラッグで移動">⠿</div>
    <div class="zoom-ctl">
      <div class="zbtn" id="zoomOut" title="縮小">－</div>
      <input type="range" id="zoomRange" min="0.5" max="2" step="0.1" value="0.5">
      <div class="zbtn" id="zoomIn" title="拡大">＋</div>
      <span class="zval" id="zoomVal">50%</span>
    </div>
    <div class="status"><span class="live-dot"></span><span id="count">読み込み中…</span><span class="remain" id="remain"></span></div>
  </div>

  <div id="msg" class="float-msg"></div>

  <!-- 浮いている半紙パネル -->
  <section class="float-desk" id="floatDesk">
    <div class="desk-bar">
      <button class="desk-toggle" id="deskToggle" title="しまう／ひらく">−</button>
      <span class="desk-bar-title">半紙</span>
      <button class="desk-orient" id="deskOrient" title="半紙を横向きに">横</button>
      <button class="desk-reset" id="deskReset" title="半紙・マップ・ズームの位置を元に戻す">⟲</button>
    </div>
    <div class="desk-body" id="deskBody">
      <div class="canvas-frame">
        <canvas id="pad"></canvas>
        <div class="seal-stamp" aria-hidden="true"><img id="sealStampImg" alt=""></div>
      </div>

      <div class="tools">
        <div class="btns btns-act">
          <button class="btn-ghost" id="undo">戻</button>

let authStarted = false;     // 認証完了後に一度だけ購読開始

/* ---------- canvas drawing ---------- */
const pad = document.getElementById("pad");
const ctx = pad.getContext("2d", { willReadFrequently: true });
const DPR = Math.min(window.devicePixelRatio || 1, 2);
const PAPER = "#f7f4ec";
let color = "#1a1714";
let size = 14;
let brushType = "taper";              // "taper"=先細, "flat"=平筆
const NIB = -35 * Math.PI/180;        // 平筆のニブ角度
let drawing = false;
let last = null;
let lastMid = null;   // 中点スムージング用：直前のセグメント終点（点列化を防ぐ）
let lastTime = 0;
let lastWidth = 0;
let lastDir = null;   // 直近の運筆方向（抜きの三角テールに使う）
let penOff = false;   // 描画中にカーソルが描画エリア外に出ているか
let strokeLen = 0;    // ストローク開始からの累積距離（入りの筆圧ランプ用）
let fillMode = false; // 塗りつぶし（バケツ）モード
let undoStack = [];

let canvasScale = 1;   // 表示倍率（1 or 1.5）。内部解像度はこれに依らず一定に保つ
let landscape = false; // 半紙の向き（false=縦2:3 / true=横3:2）
function setupCanvas(clear){
  const rect = pad.getBoundingClientRect();
  if(rect.width < 1){                              // まだ幅0（レイアウト前 or 半紙を畳み中）＝ここでサイズを取ると内部0×0になり描けなくなる
    if(!floatDesk.classList.contains("collapsed")) requestAnimationFrame(()=>setupCanvas(clear));  // 開いてるのに0＝レイアウト待ち。幅が出たら設定し直す（畳み中は何もしない）
    return;                                        // 既存の半紙を壊さずそのまま温存
  }
  const baseW = rect.width / canvasScale;          // 表示が1.5倍でも内部は等倍基準
  const ratio = landscape ? (2/3) : 1.5;           // 縦:高さ=幅*1.5 / 横:高さ=幅*2/3
  const w = Math.round(baseW * DPR);
  const h = Math.round(baseW * ratio * DPR);
  // clear=true（向き切替）なら中身は引き継がない。それ以外（リサイズ等）は今の絵を保つ
  let prev = null;
  if (!clear && pad.width) { prev = document.createElement("canvas"); prev.width = pad.width; prev.height = pad.height; prev.getContext("2d").drawImage(pad,0,0); }
  if (clear) LS.del("fg_draft");                   // 切替で消すので下書きも破棄
  pad.width = w; pad.height = h;
  ctx.fillStyle = PAPER; ctx.fillRect(0,0,w,h);
  if (prev) ctx.drawImage(prev,0,0,w,h);
  ctx.lineCap = "round"; ctx.lineJoin = "round";
}
window.addEventListener("resize", ()=>{ const d=pad.toDataURL(); const img=new Image(); img.onload=()=>{ setupCanvas(); ctx.drawImage(img,0,0,pad.width,pad.height); }; img.src=d; });

function pos(e){
  const r = pad.getBoundingClientRect();
  const cx = (e.touches? e.touches[0].clientX : e.clientX) - r.left;
  const cy = (e.touches? e.touches[0].clientY : e.clientY) - r.top;
  return { x: cx * (pad.width / r.width), y: cy * (pad.height / r.height) };
}
function pushUndo(){
  try{ undoStack.push(ctx.getImageData(0,0,pad.width,pad.height)); if(undoStack.length>12) undoStack.shift(); }catch(e){}
}
// 念のため：描き始める瞬間に半紙の内部解像度が表示サイズと合っているか確認し、ズレてたら設定し直す
// （初期化のタイミングによっては setupCanvas が表示前に走って 0×0 等になり「描けない」ことがあるため、ここで確実に直す）
function ensureCanvas(){
  const r = pad.getBoundingClientRect();
  if(r.width < 1) return;
  const expectW = Math.round((r.width / canvasScale) * DPR);
  if(!pad.width || Math.abs(pad.width - expectW) > 2) setupCanvas();
}
function start(e){
  e.preventDefault();
  ensureCanvas();                                                                 // 描く直前に半紙サイズを保証
  if(fillMode){ pushUndo(); const fp = pos(e); floodFill(fp.x, fp.y); return; } // バケツ：タップ位置を塗る
  pushUndo();
  drawing = true; last = pos(e); lastMid = last; lastTime = performance.now(); lastDir = null; penOff = false; strokeLen = 0;
  if(brushType==="flat"){ flatDab(last); return; }
  if(brushType==="round"){ dot(last, size*DPR); return; } // 丸筆：一定の太さ
  lastWidth = Math.max(1, size*0.12)*DPR; // 入り：ごく細い種点から
  dot(last, lastWidth);
}
function flatNib(){ const h=size/2*DPR; return { nx:Math.cos(NIB)*h, ny:Math.sin(NIB)*h }; }
function flatDab(p){
  const {nx,ny}=flatNib();
  ctx.strokeStyle=color; ctx.lineWidth=Math.max(2, size*0.18*DPR); ctx.lineCap="round";
  ctx.beginPath(); ctx.moveTo(p.x+nx,p.y+ny); ctx.lineTo(p.x-nx,p.y-ny); ctx.stroke();
}
// a→b をニブ（固定角の平筆）で連続的に塗る。点が飛んでもドットにならないよう細かく補間
function flatStroke(a,b){
  const {nx,ny}=flatNib();
  const lw = Math.max(2, size*0.18*DPR);
  const d = Math.hypot(b.x-a.x, b.y-a.y);
  const n = Math.max(1, Math.ceil(d/(lw*0.5)));   // ニブ太さより細かい間隔で重ねる
  ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.lineCap="round";
  for(let i=0;i<=n;i++){
    const t=i/n, x=a.x+(b.x-a.x)*t, y=a.y+(b.y-a.y)*t;
    ctx.beginPath(); ctx.moveTo(x+nx,y+ny); ctx.lineTo(x-nx,y-ny); ctx.stroke();
  }
}
function resumeAt(p){            // エリアに戻った：同じ太さのまま継ぎ目なく再開（線でつながない）
  penOff = false;
  last = p; lastMid = p; lastTime = performance.now(); lastDir = null;
}
function move(e){
  if(!drawing) return; e.preventDefault();
  const p = pos(e);
  const inside = p.x>=0 && p.x<=pad.width && p.y>=0 && p.y<=pad.height;
  if(!inside){ penOff = true; return; }     // 外：描かない・ストロークも終わらせない
  if(penOff || !last){ resumeAt(p); return; } // 戻ってきた→同じストロークとして再開

  if(brushType==="flat"){ flatStroke(last, p); last = p; return; }
  if(brushType==="round"){          // 丸筆：太さ一定・丸い筆。前回点→現在点を必ず一本の線でつなぐ
    ctx.strokeStyle=color; ctx.lineWidth=size*DPR; ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke();
    last = p; return;
  }

  const now = performance.now();
  const dx = p.x-last.x, dy = p.y-last.y;
  const dist = Math.hypot(dx,dy);

  // 先細：入りは細い点から、開始距離に応じて本体の太さまで立ち上げる（速度には依存しない）
  const base = size*DPR;
  strokeLen += dist;
  const head = Math.min(1, strokeLen/(base*2.0));   // base*2pxかけて 0.08→1.0
  const targetW = base * (0.08 + 0.92*head);
  // なめらかに太さを変化させる
  const w = lastWidth + (targetW-lastWidth)*0.5;

  ctx.strokeStyle = color;
  ctx.lineWidth = w;
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  ctx.beginPath();
  ctx.moveTo(last.x,last.y);
  ctx.lineTo(p.x,p.y);        // 前回点→現在点を必ず一本の線でつなぐ（高速でも途切れない）
  ctx.stroke();

  if(dist>0.5){ lastDir = { x:dx/dist, y:dy/dist }; }
  last = p; lastTime = now; lastWidth = w;
}
// 抜き：運筆方向へ延長して0へ細める（先端を点にする）
function taperTail(){
  if(!last || !lastDir || lastWidth<=0.6) return;
  const steps = 6;
  const len = Math.min(lastWidth*1.6, size*DPR*1.4);
  const startP = last;                       // 線が実際に終わっている点から繋ぐ
  let x = startP.x, y = startP.y, w0 = lastWidth;
  ctx.strokeStyle = color; ctx.lineCap = "round"; ctx.lineJoin = "round";
  for(let i=1;i<=steps;i++){
    const nx = startP.x + lastDir.x*(len*i/steps);
    const ny = startP.y + lastDir.y*(len*i/steps);
    const w1 = lastWidth*(1 - i/steps);   // 先端まで0へ
    ctx.lineWidth = Math.max(0.3, (w0+w1)/2);
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(nx,ny); ctx.stroke();
    x = nx; y = ny; w0 = w1;
  }
}
function dot(p,w){
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(p.x,p.y,(w||size*DPR)/2,0,Math.PI*2);
  ctx.fill();
}
function end(){
  const wasDrawing = drawing;
  if(drawing && brushType==="taper") taperTail();
  drawing=false; last=null; lastDir=null;
  if(wasDrawing) scheduleDraftSave();   // 描き終わりごとに下書き退避
}
/* ---------- 描きかけの自動退避（端末ローカル） ---------- */
let draftTimer = 0;
function saveDraftNow(){ try{ LS.set("fg_draft", pad.toDataURL("image/png")); }catch(e){} }
function scheduleDraftSave(){ clearTimeout(draftTimer); draftTimer = setTimeout(saveDraftNow, 800); }
function restoreDraft(){
  const d = LS.get("fg_draft"); if(!d) return;
  const im = new Image();
  im.onload = ()=>{ ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.fillStyle=PAPER; ctx.fillRect(0,0,pad.width,pad.height); ctx.drawImage(im,0,0,pad.width,pad.height); ctx.restore(); };
  im.src = d;
}
window.addEventListener("pagehide", saveDraftNow);
document.addEventListener("visibilitychange", ()=>{ if(document.hidden) saveDraftNow(); });
function hexToRgb(hex){
  hex = String(hex).replace("#","");
  if(hex.length===3) hex = hex.split("").map(c=>c+c).join("");
  const n = parseInt(hex,16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}
// バケツ塗りつぶし（クリック地点と地続きの同系色領域を現在色で塗る）
function floodFill(sx, sy){
  const W = pad.width, H = pad.height;
  sx = Math.max(0, Math.min(W-1, Math.round(sx)));
  sy = Math.max(0, Math.min(H-1, Math.round(sy)));
  let img;
  try{ img = ctx.getImageData(0,0,W,H); }catch(e){ return; }
  const data = img.data;
  const i0 = (sy*W+sx)*4;
  const tr=data[i0], tg=data[i0+1], tb=data[i0+2], ta=data[i0+3];
  const [fr,fg,fb] = hexToRgb(color);
  if(Math.abs(tr-fr)<3 && Math.abs(tg-fg)<3 && Math.abs(tb-fb)<3 && ta===255) return; // 既に同色
  const tol = 48;
  const match = (i)=> Math.abs(data[i]-tr)<=tol && Math.abs(data[i+1]-tg)<=tol &&
                      Math.abs(data[i+2]-tb)<=tol && Math.abs(data[i+3]-ta)<=tol;
  const seen = new Uint8Array(W*H);
  const stack = [[sx,sy]];
  while(stack.length){
    const [px,py] = stack.pop();
    let x = px;
    while(x>=0 && !seen[py*W+x] && match((py*W+x)*4)) x--;
    x++;
    let up=false, down=false;
    while(x<W && !seen[py*W+x] && match((py*W+x)*4)){
      const p=(py*W+x)*4;
      data[p]=fr; data[p+1]=fg; data[p+2]=fb; data[p+3]=255;
      seen[py*W+x]=1;
      if(py>0){ const a=((py-1)*W+x); if(!seen[a] && match(a*4)){ if(!up){ stack.push([x,py-1]); up=true; } } else up=false; }
      if(py<H-1){ const b=((py+1)*W+x); if(!seen[b] && match(b*4)){ if(!down){ stack.push([x,py+1]); down=true; } } else down=false; }
      x++;
    }
  }
  // 1px 外側に拡張して塗る（境界のにじみ・隙間を埋める）
  const add = [];
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      const id=y*W+x;
      if(seen[id]) continue;
      let near=false;
      for(let dy=-1;dy<=1 && !near;dy++){
        for(let dx=-1;dx<=1;dx++){
          if(!dy && !dx) continue;
          const ny=y+dy, nx=x+dx;
          if(ny>=0&&ny<H&&nx>=0&&nx<W && seen[ny*W+nx]){ near=true; break; }
        }
      }
      if(near) add.push(id);
    }
  }
  for(const id of add){ const p=id*4; data[p]=fr; data[p+1]=fg; data[p+2]=fb; data[p+3]=255; }
  ctx.putImageData(img,0,0);
  scheduleDraftSave();
}

document.getElementById("colors").addEventListener("click",e=>{

  sw.classList.add("active");

});
/* 色パレットが入りきらない時、左右に◀▶を出してスクロール（両方向） */
const swatchScrollEl = document.getElementById("swatchScroll");
const swatchMoreEl  = document.getElementById("swatchMore");    // 右 ▶
const swatchMoreLEl = document.getElementById("swatchMoreL");   // 左 ◀
function updateSwatchMore(){
  if(!swatchScrollEl) return;
  const moreR = (swatchScrollEl.scrollWidth - swatchScrollEl.scrollLeft - swatchScrollEl.clientWidth) > 4;
  const moreL = swatchScrollEl.scrollLeft > 4;
  if(swatchMoreEl)  swatchMoreEl.classList.toggle("show", moreR);   // 右に続きがある
  if(swatchMoreLEl) swatchMoreLEl.classList.toggle("show", moreL);  // 左に戻れる
}
if(swatchScrollEl){
  swatchScrollEl.addEventListener("scroll", updateSwatchMore, {passive:true});
  if(swatchMoreEl)  swatchMoreEl.addEventListener("click",  ()=> swatchScrollEl.scrollBy({left:  swatchScrollEl.clientWidth*0.6, behavior:"smooth"}));
  if(swatchMoreLEl) swatchMoreLEl.addEventListener("click", ()=> swatchScrollEl.scrollBy({left: -swatchScrollEl.clientWidth*0.6, behavior:"smooth"}));
}
window.addEventListener("resize", updateSwatchMore);
/* パレット：墨(左端固定)＋中間色(最大5)＋消しゴム(右端固定)。中間色は meta/palette で全員共有 */
const PAL_BLACK = "#1a1714";
const PAL_DEFAULT_MID = ["#b5341f","#1d5a8c","#2f7d3b","#e6b800","#f0e0d6"];
let paletteMid = PAL_DEFAULT_MID.slice();
function isHex6(c){ return typeof c==="string" && /^#[0-9a-fA-F]{6}$/.test(c); }
function renderPalette(){
  const wrap = document.getElementById("swatchScroll");
  if(!wrap) return;
  const cur = color;        // 今の選択を覚える
  const mids = (paletteMid||[]).filter(isHex6).slice(0,5);
  let html = '';
  html += '<div class="swatch" data-color="'+PAL_BLACK+'" style="background:'+PAL_BLACK+'"></div>';
  mids.forEach(c=>{ html += '<div class="swatch" data-color="'+c+'" style="background:'+c+'"></div>'; });
  html += '<div class="swatch" data-color="#ffffff" style="background:#ffffff;box-shadow:inset 0 0 0 1px rgba(140,110,60,.28)" title="白"></div>';
  wrap.innerHTML = html;
  // 選択を復元（無くなっていたら墨）。描画状態も合わせる
  let sel = wrap.querySelector('.swatch[data-color="'+cur+'"]') || wrap.querySelector('.swatch[data-color="'+PAL_BLACK+'"]');
  if(sel){ sel.classList.add("active"); color = sel.dataset.color; }
  if(typeof updateSwatchMore==="function") updateSwatchMore();   // 色数が変わったら矢印の表示を更新
}
// 太さは全段クリッキーな12段。位置(0〜11)→筆の太さ。最細は2px、最太は描画幅の約40%
const SIZE_STEPS = 12;
function sizeFromPos(i){
  i = Math.max(0, Math.min(SIZE_STEPS-1, Math.round(i)));
  const cw = (pad.getBoundingClientRect().width) || 248;     // 描画エリア幅(CSS px)
  const min = 2, max = Math.round(cw*0.40);
  const t = i/(SIZE_STEPS-1);
  return Math.max(2, Math.round(min + (max-min)*Math.pow(t, 1.7)));  // 細い側を細かく
}
document.getElementById("size").addEventListener("input",e=>{
  const pos = Math.round(+e.target.value);   // 0〜11 の段（スライダー自体が段に吸い付く）
  e.target.value = pos;
  size = sizeFromPos(pos);
  LS.set("fg_sizePos", pos);   // 次回に引き継ぐ（段番号）
});

function applyImgPostState(){
  const b = document.getElementById("photoBtn");
  if(b){ b.style.opacity = imgPostOn ? "" : ".4"; b.title = imgPostOn ? "" : "運営が画像投稿を停止中"; }
  const hint = document.getElementById("photoHint");
  if(hint){ hint.style.display = imgPostOn ? "" : "none"; }   // 撮影投稿ONの時だけ注意文を出す
  if(admin) render();   // 運営バナーのON/OFF表記を更新
}
function loadImgEl(file){
  return new Promise((res,rej)=>{
    const img = new Image(); const url = URL.createObjectURL(file);
    img.onload = ()=>{ URL.revokeObjectURL(url); res(img); };
    img.onerror = (e)=>{ URL.revokeObjectURL(url); rej(e); };
    img.src = url;
  });
}
function drawPhotoCover(img){
  const cw = pad.width, ch = pad.height;            // 半紙キャンバス（2:3）
  const iw = img.width, ih = img.height;
  const cr = cw/ch, ir = iw/ih;
  let sx, sy, sw, sh;
  if(ir > cr){ sh = ih; sw = ih*cr; sx = (iw-sw)/2; sy = 0; }   // 横長→左右を切る
  else       { sw = iw; sh = iw/cr; sx = 0; sy = (ih-sh)/2; }   // 縦長→上下を切る
  ctx.fillStyle = PAPER; ctx.fillRect(0,0,cw,ch);
  ctx.drawImage(img, sx,sy,sw,sh, 0,0, cw,ch);                   // はみ出しを切って全面に
  scheduleDraftSave();
}
photoInput.addEventListener("change", async (e)=>{
  const file = e.target.files && e.target.files[0];
  e.target.value = "";                              // 同じ写真を選び直せるように
  if(!file) return;
  try{
    let img;
    try{ img = await createImageBitmap(file, {imageOrientation:"from-image"}); }  // EXIF回転を反映
    catch(_){ img = await loadImgEl(file); }
    pushUndo();
    drawPhotoCover(img);
    if(img.close) img.close();
    toast("写真をのせました。貼る場所を選んでね");
  }catch(err){
    console.error(err); toast("写真を読み込めませんでした");
  }
});
function doUndo(){ const s=undoStack.pop(); if(s) ctx.putImageData(s,0,0); scheduleDraftSave(); }
document.getElementById("undo").addEventListener("click", doUndo);
document.getElementById("clear").addEventListener("click",()=>{ pushUndo(); ctx.fillStyle=PAPER; ctx.fillRect(0,0,pad.width,pad.height); scheduleDraftSave(); });

sealImg.src = SEAL_SRC;   // ふたば朱印（透過PNG）。起動時に先読みし、書き出し時に合成
(function(){ const si = document.getElementById("sealStampImg"); if(si) si.src = SEAL_SRC; })();   // プレビューも同じPNGに
function drawSeal(o, cx, cy, side){
  if(sealImg.complete && sealImg.naturalWidth){ o.drawImage(sealImg, cx, cy, side, side); }
}
function expoW(){ return landscape ? 330 : 220; }
function expoH(){ return landscape ? 220 : 330; }
function exportImage(){
  const out = document.createElement("canvas");
  const _W=expoW(), _H=expoH(); out.width=_W; out.height=_H;
  const o = out.getContext("2d");
  o.fillStyle = PAPER; o.fillRect(0,0,_W,_H);
  o.drawImage(pad,0,0,_W,_H);
  const side = 62, margin = 14;
  drawSeal(o, _W-margin-side, _H-margin-side, side);
  // WebP対応ブラウザはWebPで書き出し（JPEGより2〜3割小さい）。非対応(古いSafari等)は自動でJPEG
  let data = out.toDataURL("image/webp", 0.72);
  if(!data.startsWith("data:image/webp")) data = out.toDataURL("image/jpeg", 0.7);
  return data;
}
function isBlank(){
  // sample a downscale and check variance vs paper
  const t=document.createElement("canvas"); t.width=40;t.height=60;
  const tc=t.getContext("2d", { willReadFrequently: true }); tc.drawImage(pad,0,0,40,60);
  const d=tc.getImageData(0,0,40,60).data;
  for(let i=0;i<d.length;i+=4){ if(Math.abs(d[i]-244)>22||Math.abs(d[i+1]-236)>22||Math.abs(d[i+2]-216)>22) return false; }
  return true;
}

/* ---------- 画像キャッシュ（メモリ + IndexedDB） ---------- */
const imgCache = new Map();   // id -> dataURL（このセッション）
const imgState = new Map();   // id -> "loading" | "loaded" | "error"
let idbPromise = null;
function openIDB(){
  if(idbPromise) return idbPromise;
  idbPromise = new Promise((res)=>{
    try{
      const req = indexedDB.open("futaba-oshuji", 1);
      req.onupgradeneeded = ()=>{ const d=req.result; if(!d.objectStoreNames.contains("imgs")) d.createObjectStore("imgs"); };
      req.onsuccess = ()=> res(req.result);
      req.onerror  = ()=> res(null);
    }catch(_){ res(null); }
  });
  return idbPromise;
}
async function idbGet(id){
  const db = await openIDB(); if(!db) return null;
  return new Promise(res=>{
    try{ const tx=db.transaction("imgs","readonly").objectStore("imgs").get(id);
      tx.onsuccess=()=>res(tx.result||null); tx.onerror=()=>res(null);
    }catch(_){ res(null); }
  });
}
async function idbPut(id, data){
  const db = await openIDB(); if(!db) return;
  try{ db.transaction("imgs","readwrite").objectStore("imgs").put(data, id); }catch(_){}
}
async function idbDel(id){
  const db = await openIDB(); if(!db) return;
  try{ db.transaction("imgs","readwrite").objectStore("imgs").delete(id); }catch(_){}
}
function isImgData(d){ return typeof d==="string" && d.startsWith("data:image/"); }   // XSS対策：画像以外は弾く
function seedImage(id, data){   // 自分の投稿などをキャッシュに先置き
  if(!isImgData(data)) return;
  imgCache.set(id, data); imgState.set(id, "loaded"); idbPut(id, data);
}
function noteImgSrc(id){
  const data = imgCache.get(id);
  if(isImgData(data)) return data;                       // 自分の投稿など（dataURL・このセッション）
  const p = posts.get(id);
  if(p && isSafePath(p.imgPath)) return imgUrl(p.imgPath);// Supabase 公開URL
  if(p && isImgData(p.img)) return p.img;                // 旧：埋め込みdataURL
  return null;
}
function setNoteImg(id){
  const src = noteImgSrc(id); if(!src) return;           // プロパティ代入（XSS安全）
  const el = notesEl.querySelector('.note[data-id="'+id+'"] .note-img');
  if(el){ el.src = src; el.classList.add("ready"); }
}
async function loadImage(id){
  if(imgState.get(id)==="loaded" || imgState.get(id)==="loading") return;
  const p = posts.get(id);
  if(p && isImgData(p.img)){ seedImage(id, p.img); setNoteImg(id); return; }      // 旧：埋め込み
  if(imgCache.has(id)){ imgState.set(id,"loaded"); setNoteImg(id); return; }       // 自分の投稿（dataURL）
  if(p && isSafePath(p.imgPath)){ imgState.set(id,"loaded"); setNoteImg(id); return; } // Supabase：ブラウザがHTTPキャッシュ
  // 旧データ救済：base64がRTDBにある場合だけ取得
  imgState.set(id, "loading");
  const local = await idbGet(id);
  if(isImgData(local)){ imgCache.set(id, local); imgState.set(id,"loaded"); setNoteImg(id); return; }
  try{
    const snap = await get(ref(db, bpath("imgs/"+id)));
    const data = snap && snap.val();
    if(isImgData(data)){ imgCache.set(id, data); imgState.set(id,"loaded"); idbPut(id, data); setNoteImg(id); }
    else { imgState.set(id, "error"); }
  }catch(e){ imgState.set(id, "error"); }
}
// 表示範囲（＋余白）にある半紙の画像だけ読み込む
let lazyScheduled = false;
function scheduleLazy(){ if(lazyScheduled) return; lazyScheduled=true; requestAnimationFrame(()=>{ lazyScheduled=false; ensureImagesInView(); }); }
function ensureImagesInView(){
  if(!notesEl) return;
  if(NOTE_W*zoom < 56) return;   // 全体を引きで見ている時（半紙が極小）は取得を保留＝大量DL抑制
  const marginX = scrollEl.clientWidth*0.25, marginY = scrollEl.clientHeight*0.25;  // 先読みを控えめに
  const x0 = scrollEl.scrollLeft/zoom - marginX/zoom;
  const x1 = (scrollEl.scrollLeft+scrollEl.clientWidth)/zoom + marginX/zoom;
  const y0 = scrollEl.scrollTop/zoom - marginY/zoom;
  const y1 = (scrollEl.scrollTop+scrollEl.clientHeight)/zoom + marginY/zoom;
  posts.forEach((p,id)=>{
    if(p.hidden && !admin) return;
    if(imgState.get(id)==="loaded" || imgState.get(id)==="loading") return;
    const cx = nxOf(p,id)*(WALL_W-NOTE_W) + NOTE_W/2;
    const cy = nyOf(p,id)*(WALL_H-NOTE_H) + NOTE_H/2;
    if(cx>=x0 && cx<=x1 && cy>=y0 && cy<=y1) loadImage(id);
  });
}

function tapeColor(){ const a=[ -5,-3,3,5,-2,2 ]; return a[Math.floor(Math.random()*a.length)]; }
function esc(s){ return (s||"").replace(/[<>&"]/g, c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c])); }
function rndAngle(){ return Math.round(Math.random()*5) * (Math.random()<0.5?-1:1); } // 初期は垂直から±5°
function hashFrac(str, salt){ let h=2166136261; const s=(str||"")+salt; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return ((h>>>0)%10000)/10000; }
function nxOf(p,id){ return (typeof p.nx==="number") ? p.nx : hashFrac(id,"x"); }
function nyOf(p,id){ return (typeof p.ny==="number") ? p.ny : hashFrac(id,"y"); }
function angOf(p,id){ return (typeof p.angle==="number") ? p.angle : Math.round(hashFrac(id,"a")*44-22); }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

function setMsg(html){ msgEl.innerHTML = html || ""; }

let _renderScheduled = false;
function requestRender(){            // 連続呼び出しを次フレームに1回へ集約（初期ロードの O(N²) を解消）
  if(_renderScheduled) return;
  _renderScheduled = true;
  requestAnimationFrame(()=>{ _renderScheduled = false; render(); });
}
function render(){
  const list = [...posts.entries()].map(([id,p])=>({id,...p}));
  // 運営は全部表示。一般表示は「運営が非表示」または「delがしきい値以上」を隠す（恒久削除は運営のみ）
  // さらに、キーが安全な文字のみの半紙だけを描画（細工キーによるXSSを遮断）
  const visible = (admin ? list : list.filter(p=> !p.hidden && (p.del||0) < DEL_THRESHOLD))
    .filter(p=> typeof p.id==="string" && /^[A-Za-z0-9_-]+$/.test(p.id));
  visible.sort((a,b)=> (a.t||0)-(b.t||0)); // 古い順に重ねる（新しいものが上）
  countEl.textContent = visible.length ? visible.length + " 枚" : (postsLoaded ? "まだ0枚" : "読み込み中…");

  // メッセージ帯（運営/空）。placing中の案内は別途出すので上書きしない
  if(!placing){
    if(admin){
      setMsg('<div class="admin-banner"><span>運営モード（ボード'+(boardId||1)+'・'+boardCount+'/'+BOARD_LIMIT+'枚）</span><span class="cancel" style="cursor:pointer;text-decoration:underline" onclick="toggleImgPost()">画像投稿：'+(imgPostOn?'ON':'OFF')+'</span><span class="cancel" style="cursor:pointer;text-decoration:underline" onclick="openPaletteEditor()">色設定</span><span class="cancel" style="cursor:pointer;text-decoration:underline" onclick="archiveAndAdvance()">保存して新ボードへ</span><span class="cancel" style="cursor:pointer;text-decoration:underline" onclick="exitAdmin()">終了</span></div>');
    } else if(!visible.length){
      if(postsLoaded){
        setMsg('<div class="empty"><span class="big">習</span>まだ誰も貼っていません。<br>左で書いて「貼る」を押そう。</div>');
      } else {
        setMsg('<div class="loading">読み込み中…</div>');   // ロード中は空メッセージを出さない
      }
    } else {
      setMsg("");
    }
  }

  notesEl.innerHTML = visible.map(p=>{
    const left = clamp(nxOf(p,p.id),0,1) * (WALL_W-NOTE_W);
    const top  = clamp(nyOf(p,p.id),0,1) * (WALL_H-NOTE_H);
    const ang  = angOf(p,p.id);
    const aNorm = ((ang%360)+360)%360;
    const flippedCls = (aNorm>90 && aNorm<270) ? " flipped" : "";   // 上下反転している半紙
    const imgHtml = `<img class="note-img" alt="">`;   // srcはinnerHTMLに入れず、後でプロパティ代入（XSS安全）
    const souCls = (souDone.has(p.id) ? "sou-btn done" : "sou-btn") + (p.id===justVoted ? " pop" : "");
    if(p.id===justVoted) justVoted = null;
    const delCls = delDone.has(p.id) ? "del-btn done" : "del-btn";
    const hiddenBadge = p.hidden ? '<span class="hidden-badge">非表示</span>' : '';
    const isMyGrace = (p.id===graceNoteId && p.uid===myUid);   // 貼った直後の自分の半紙
    const souBtn = isMyGrace ? '' : `<button class="${souCls}" onclick="vote('sou','${p.id}')">そうだね<span class="n"> ${p.sou||0}</span></button>`;
    const delBtn = isMyGrace ? '' : `<button class="${delCls}" onclick="vote('del','${p.id}')">del</button>`;
    const repoBtn = (isMyGrace && !repositioningId)
      ? `<button class="repo-btn" onclick="startReposition(event,'${p.id}')">位置を直す</button>` : '';
    const undoBtn = (isMyGrace && !repositioningId)
      ? `<button class="repo-btn undo-send" onclick="undoGracePost()" title="送信前（描いた状態）に戻す">戻る</button>` : '';
    const mine = (p.id===editingId) ? " mine" : "";
    const rotoring = mine ? " rotoring" : "";   // 回転中はテープを隠す（確定後に生える）
    const fresh = !renderedIds.has(p.id) ? "" : " no-anim";  // 既存はアニメ無し（ビクつき防止）
    const adminLine = admin ? `
      <div class="admin-line">
        <span class="stat">そうだね ${p.sou||0}</span>
        <span class="stat ${ (p.del||0)>=DEL_THRESHOLD ? 'warn':'' }">del ${p.del||0}</span>
        <span style="flex:1"></span>
        ${ p.hidden ? `<button class="mini restore" onclick="adminRestore('${p.id}')">復活</button>` : '' }
        <button class="mini del" onclick="adminDelete('${p.id}')">削除</button>
      </div>` : '';
    const zr = zOverride.has(p.id) ? `;z-index:${zOverride.get(p.id)}` : "";
    return `
    <div class="note${mine}${rotoring}${fresh}${flippedCls}${p.land?' land':''} ${p.hidden?'is-hidden':''}" data-id="${p.id}" style="left:${left}px;top:${top}px;transform:rotate(${ang}deg)${zr}">
      <span class="tape" style="--r:${tapeColor()}deg"></span>
      <div class="imgwrap">${hiddenBadge}${imgHtml}</div>
      <div class="who">${esc(p.name)||"としあき"}</div>
      <div class="acts">
        ${souBtn}
        ${delBtn}
        ${repoBtn}
        ${undoBtn}
      </div>
      ${adminLine}
    </div>`;
  }).join("");

  // 再描画でHTMLを作り直すと画像が空になるので、キャッシュ済み・読み込み済みの半紙は貼り直す
  visible.forEach(p=>{ if(imgCache.has(p.id) || imgState.get(p.id)==="loaded") setNoteImg(p.id); });

  if(activeNoteId){
    const ae = notesEl.querySelector('.note[data-id="'+activeNoteId+'"]');
    if(ae) ae.classList.add("sel");
  }

  renderedIds.clear();
  visible.forEach(p=> renderedIds.add(p.id));

  if(typeof drawMinimap === "function") drawMinimap();
  scheduleLazy();   // 表示範囲の画像を読み込む
  tryNavGuide();    // 初回：見る半紙が来たら「半紙めぐり」ガイドを飛ばす
}

/* 初回オンボーディング：見る動線（半紙めぐり）も、半紙バーと同じく中央→右下へ飛んでアピール */
let navGuideArmed = false, navGuideStarted = false;
function tryNavGuide(){
  if(!navGuideArmed || navGuideStarted) return;
  const meguri = document.querySelector(".meguri");
  const g2 = document.getElementById("guide2");
  const hasNotes = [...posts.values()].some(p=> admin || (!p.hidden && (p.del||0) < DEL_THRESHOLD));
  if(!meguri || !g2 || !hasNotes) return;          // 見る対象がある時だけ
  navGuideStarted = true; navGuideArmed = false;
  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  g2.style.left = cx + "px"; g2.style.top = (cy+44) + "px"; g2.style.transform = "translate(-50%,-50%)";
  g2.classList.add("show");
  let done = false;
  const finish = ()=>{ if(done) return; done = true; g2.classList.remove("show"); meguri.classList.remove("hint"); setTimeout(()=>g2.remove(), 450); };
  g2.addEventListener("click", ()=>{ stopNavHint(); finish(); });
  const CENTER_DWELL = 1500, MOVE = 800, LINGER = 900;
  setTimeout(()=>{                                  // 右下の「半紙めぐり」へ移動
    if(done) return;
    const r = meguri.getBoundingClientRect();
    g2.style.left = r.left + "px"; g2.style.top = r.top + "px"; g2.style.transform = "translate(0,0)";
    meguri.classList.add("hint");                   // 到着で本体を点滅
  }, CENTER_DWELL);
  setTimeout(finish, CENTER_DWELL + MOVE + LINGER);
}
function stopNavHint(){
  navGuideArmed = false; navGuideStarted = true;     // 以後アピールしない
  const m = document.querySelector(".meguri"); if(m) m.classList.remove("hint");
  const g2 = document.getElementById("guide2"); if(g2 && g2.classList.contains("show")){ g2.classList.remove("show"); setTimeout(()=>g2.remove(),450); }
}

function showConnError(){
  setMsg('<div class="err">共有ボードに接続できませんでした。ページ上部の firebaseConfig（特に databaseURL）が正しく貼られているか確認してください。ローカルのファイルを直接開いた場合も動かないことがあります（github.io などに置いてください）。</div>');
}

function listen(){
  if(!db){ showConnError(); return; }
  // meta/board を監視し、変わったらそのボードを購読し直す（古いボードはアプリから見えなくなる）
  onValue(ref(db, "meta/board"), snap=>{
    let id = snap && snap.val();
    if(id == null) id = 1;                 // 未設定なら1番ボードから
    if(id !== boardId) switchToBoard(id);
  });
  // 画像投稿の可否（運営トグル）。明示的に false の時だけ停止、未設定はON
  onValue(ref(db, "meta/imgPost"), snap=>{
    imgPostOn = (snap && snap.val()) !== false;
    applyImgPostState();
  });
  // 色パレット（中間色をカンマ区切り文字列で共有）。未設定=デフォルト4色、空文字=中間色なし
  onValue(ref(db, "meta/palette"), snap=>{
    const s = snap ? snap.val() : null;
    paletteMid = (s == null) ? PAL_DEFAULT_MID.slice()
               : String(s).split(",").map(x=>x.trim()).filter(isHex6).slice(0,5);
    renderPalette();
  });
}
function unsubBoard(){ boardSubs.forEach(fn=>{ try{ fn(); }catch(e){} }); boardSubs = []; }
function switchToBoard(id){
  unsubBoard();
  boardId = id;
  // ローカル状態をまっさらに
  posts.clear(); imgCache.clear(); imgState.clear(); renderedIds.clear();
  zOverride.clear(); activeNoteId = null; editingId = null;
  graceNoteId = null; repositioningId = null;   // ボードが変わったら位置直しもリセット
  freshNotes.clear(); seenNoteIds.clear(); flashArmed = false;   // 点滅もリセット。初期ロード分は光らせない
  loadSeenT();                                                   // このボードのしおりを読み込み（セッションの未読基準を固定）
  updateFreshUI();
  setTimeout(()=>{ flashArmed = true; }, 1800);                  // 既存分の流し込みが落ち着いてから有効化
  postsLoaded = false; boardCount = 0; didInitialFocus = false;
  setActiveCount();
  render();

  const postsRef = ref(db, bpath("posts"));
  try{
    get(postsRef).then(snap=>{
      const v = snap && snap.val();
      if(v){ Object.keys(v).forEach(k=>{ posts.set(k, v[k]||{}); seenNoteIds.add(k); }); }
      postsLoaded = true; render();
      updateFreshUI(); drawMinimap();
      const u = unreadCount();
      if(u > 0) toast("前回から" + (u>99?"99+":u) + "枚 新しい半紙があるよ", 3200);   // 12時間ぶり等：差分があることだけ気づかせる
      if(!didInitialFocus && posts.size){ clearTimeout(focusTimer); focusTimer = setTimeout(initialFocus, 300); }
    }).catch(()=>{ postsLoaded = true; render(); });

    boardSubs.push(onChildAdded(postsRef, snap=>{
      const id3 = snap.key;
      posts.set(id3, snap.val()||{});
      if(flashArmed && !seenNoteIds.has(id3) && (posts.get(id3)||{}).uid !== myUid) flashNote(id3);   // 他人の新規投稿を白に（自分のは除く）
      seenNoteIds.add(id3);
      requestRender();
      if(!didInitialFocus){ clearTimeout(focusTimer); focusTimer = setTimeout(initialFocus, 500); }
    }));
    boardSubs.push(onChildChanged(postsRef, snap=>{ posts.set(snap.key, snap.val()||{}); requestRender(); }));
    boardSubs.push(onChildRemoved(postsRef, snap=>{
      const id2 = snap.key;
      posts.delete(id2); imgCache.delete(id2); imgState.delete(id2); idbDel(id2);
      requestRender();
    }));
    // 枚数（満杯判定・残数表示・通知のトリガ）
    boardSubs.push(onValue(ref(db, bpath("count")), s=>{
      boardCount = (s && s.val()) || 0;
      setActiveCount();
      maybeNotifyRemaining();
      maybeAutoArchive();   // 運営タブのみ：満員で自動保存→新ボード
    }));
  }catch(e){ console.error(e); showConnError(); }
}
function remaining(){ return Math.max(0, BOARD_LIMIT - boardCount); }
function setActiveCount(){
  // 残数の小さい表示（カウント帯の隣）。満杯なら満員表示
  const el = document.getElementById("remain");
  if(!el) return;
  const r = remaining();
  if(r <= 0){ el.textContent = "満員"; el.className = "remain full"; }
  else if(r <= 60){ el.textContent = "あと"+r+"枚で新ボード"; el.className = "remain warn"; }
  else { el.textContent = ""; el.className = "remain"; }
}
// 残り60・残り10を最初に観測した1人だけが運営へ通知（make.com）。フラグで重複防止
async function maybeNotifyRemaining(){
  if(!db || boardId == null) return;
  for(const w of WARN_REMAIN){
    if(remaining() <= w){
      const flagRef = ref(db, bpath("notified/r"+w));
      try{
        const res = await runTransaction(flagRef, cur => cur ? undefined : true);  // 既にtrueなら中止
        if(res.committed && res.snapshot.val() === true){
          notifyOwner(w);
        }
      }catch(e){}
    }
  }
}
function notifyOwner(remain){
  try{
    fetch(NOTIFY_WEBHOOK, {
      method:"POST", mode:"no-cors",
      headers:{ "Content-Type":"text/plain;charset=UTF-8" },   // text/plain でCORSプリフライト回避
      body: JSON.stringify({ board:boardId, remaining:remain, count:boardCount, limit:BOARD_LIMIT, at:new Date().toISOString() })
    }).catch(()=>{});
  }catch(e){}
}

/* ---------- placement (位置決め) ---------- */
function enterPlacing(){
  placing = true;
  placeDragging = false;
  ghostImg.src = pendingImg;
  ghostEl.classList.toggle("land", landscape);   // ゴーストも向きに合わせる
  ghostEl.classList.add("show");

// ---- 貼った直後の位置直し（猶予中は自分の最新半紙を動かせる。次に貼るまで有効） ----
let committing = false;   // 書き込み中フラグ（同期的に立てて二重確定＝二重投稿を防ぐ）
async function commitPlace(nx, ny){
  if(committing) return;                                    // 既に確定処理中なら無視（ドロップ連打・タッチ重複対策）
  committing = true;
  try{
    if(repositioningId){ await repositionPost(nx, ny); }   // 位置直しなら移動だけ
    else { await createPost(nx, ny); }                     // 通常は新規投稿
  } finally { committing = false; }
}
function startReposition(e, id){

function wallCoords(clientX, clientY){
  const r = wallEl.getBoundingClientRect(); // r is the scaled, scrolled rect
  const x = clamp((clientX - r.left)/zoom - NOTE_W/2, 0, WALL_W-NOTE_W);
  const y = clamp((clientY - r.top)/zoom - 10,        0, WALL_H-NOTE_H);
  return {x, y};
}
/* 重なり制御：下の半紙の画像部分が最低7割は露出する位置にだけ置ける（覆ってよいのは3割まで） */
function noteImgRect(x,y){ const m=6, w=NOTE_W-2*m; return {x:x+m, y:y+m, w, h:w*1.5}; }
function rectInter(a,b){
  const ix = Math.max(0, Math.min(a.x+a.w,b.x+b.w) - Math.max(a.x,b.x));
  const iy = Math.max(0, Math.min(a.y+a.h,b.y+b.h) - Math.max(a.y,b.y));
  return ix*iy;
}
function worstCover(x,y){
  const nr = {x, y, w:NOTE_W, h:NOTE_H};   // 新しい半紙が覆う全体の矩形
  let worst = 0;
  posts.forEach((p,id)=>{
    if(id === repositioningId) return;   // 位置直し中の本人は重なり判定から除外
    if(p.hidden && !admin) return;
    const ex = clamp(nxOf(p,id),0,1)*(WALL_W-NOTE_W);
    const ey = clamp(nyOf(p,id),0,1)*(WALL_H-NOTE_H);
    const ir = noteImgRect(ex,ey);
    const cov = rectInter(nr, ir)/(ir.w*ir.h);   // 下の画像がどれだけ隠れるか
    if(cov>worst) worst = cov;
  });
  return worst;
}
const COVER_MAX = 0.3;                       // 覆ってよい上限＝3割（＝7割は露出）
function canPlaceAt(x,y){ return worstCover(x,y) <= COVER_MAX; }
wallEl.addEventListener("pointermove", e=>{
  if(!placing) return;
  const {x,y} = wallCoords(e.clientX, e.clientY);
  ghostEl.style.left = x+"px"; ghostEl.style.top = y+"px";

wallEl.addEventListener("click", async e=>{

});
// スマホ：指で押してドラッグ→離して確定（赤＝置けない／消える＝置ける のプレビュー付き）

const postBtn = document.getElementById("post");
postBtn.addEventListener("click", ()=>{

async function createPost(nx, ny){
  if(!db || !myUid){ toast("接続中です。少し待ってね"); return; }
  if(boardId == null){ toast("接続中です。少し待ってね"); return; }   // ボード未取得
  const RANDOM_NAMES = ["としあき","ﾄﾁｬｷ","としくん","「」","kakko","空白","jun","ぴるす","鍵最高","アージュ","雪の降る町","心理","ハデス","雨坊主","心太","ネギさま","こまち","jun君","自転車で来た","音ゲーの常連","DDRの常連"];
  let name = document.getElementById("who").value.trim().slice(0,16);
  if(!name) name = RANDOM_NAMES[Math.floor(Math.random()*RANDOM_NAMES.length)]; // 空欄ならランダム
  const finalNow = isMobileView();   // モバイルはドロップで確定。PCは回転確定時にクールダウンを消費
  const angle = finalNow ? (Math.random()<0.5?-4:4) : rndAngle();  // モバイルは左右4°のみ
  const img = pendingImg;
  const meta = { name, t: Date.now(), sou:0, del:0, hidden:false, nx, ny, angle, uid: myUid };  // 画像は含めない・作成者UID付き
  if(landscape) meta.land = true;   // 横向きの時だけ向き情報を付与（縦は項目を増やさない＝既存ルールのまま通る）
  postBtn.disabled = true;
  let reserved = false;
  try{
    // まず枚数枠を予約（トランザクションで満杯を確実に判定）
    const cres = await runTransaction(ref(db, bpath("count")), c => {
      c = c || 0;
      if(c >= BOARD_LIMIT) return;   // 満杯 → 中止
      return c + 1;
    });
    if(!cres.committed){ postBtn.disabled=false; cancelPlacing(); toast("満員です。運営の切り替えを待ってね"); return; }
    reserved = true;

    const id = push(ref(db, bpath("posts"))).key;   // キーだけ先に確保（まだ書かない）
    seedImage(id, img);                              // 先にキャッシュ（自分の画像は即表示）

    // 画像本体は Supabase Storage へ。失敗時は従来どおり Firebase に base64 で保存（無停止フォールバック）
    let imgPath = null;
    const useSupa = supa && !SUPA_ANON.startsWith("（");
    if(useSupa){
      try{
        const fileBlob = await (await fetch(img)).blob();
        const ext = (fileBlob.type === "image/webp") ? "webp" : "jpg";
        const path = "boards/" + boardId + "/" + id + "." + ext;
        const { error } = await supa.storage.from(SUPA_BUCKET).upload(path, fileBlob, { contentType: fileBlob.type, upsert: false });
        if(error) throw error;
        imgPath = path;
      }catch(e){ console.error("Supabase upload失敗→Firebaseへ退避", e); imgPath = null; }
    }
    if(imgPath) meta.imgPath = imgPath;

    // メタを書き込み。imgPathが無い時だけ画像base64も書く。確定時のみスロットルも進める
    const writes = { [bpath("posts/"+id)]: meta };
    if(!imgPath) writes[bpath("imgs/"+id)] = img;
    if(finalNow) writes["throttle/"+myUid] = serverTimestamp();
    await update(ref(db), writes);
    reserved = false;   // 書き込み成功＝枠は確定
    if(finalNow){ lastPostAt = Date.now(); LS.set("fg_lastPost", String(lastPostAt)); }
    editingId = id;
    posts.set(id, meta);
    // 後片付け
    placing = false; placeDragging = false; ghostEl.classList.remove("show"); wallEl.classList.remove("placing"); scrollEl.classList.remove("placing-lock");
    postBtn.textContent = "貼 る";
    setDeskCollapsed(true);   // 貼ったら半紙は閉じる（PC・モバイルとも）
    lastDrawing = pad.toDataURL();   // キャンセル時に戻せるよう退避
    ctx.fillStyle=PAPER; ctx.fillRect(0,0,pad.width,pad.height); undoStack=[];
    LS.del("fg_draft");   // 貼ったので下書きは破棄
    setMsg("");
    if(finalNow){
      editingId = null;          // モバイルは角度調整なし（ランダム±4°のまま）
      graceNoteId = id;          // 貼った直後だけ位置を直せる（次に貼るまで／本人のみ）
      render();
    } else {
      render();
      openRotor(id, angle);      // PCは半紙中央を軸にした弧型スライダーで回転（確定でクールダウン消費）
    }
  }catch(e){
    console.error(e);
    if(reserved && db){ runTransaction(ref(db, bpath("count")), c => Math.max(0,(c||0)-1)).catch(()=>{}); }  // 予約枠を返す
    const wait = Math.ceil((lastPostAt + POST_COOLDOWN_MS - Date.now())/1000);
    if(wait > 0){
      cancelPlacing();
      toast("あと "+wait+" 秒で投稿できます");   // 連投クールダウン中（端末が把握）
    } else if(String(e && (e.code||e.message)).indexOf("PERMISSION_DENIED")>=0){
      cancelPlacing();
      toast("少し時間をおいて試してね");          // サーバ側で拒否（クールダウン等）
    } else { toast("貼れませんでした…"); showConnError(); }
  }
  postBtn.disabled = false;
}

/* ---------- 半紙の回転を適用（ダイヤルから使用） ---------- */
function setNoteTransform(id, rot){
  const el = notesEl.querySelector('.note[data-id="'+id+'"]');
  if(el) el.style.transform = "rotate("+rot+"deg)";
}

/* ---------- PC: 円形ダイヤルで回転（静止は±20°）。横を越えて引き回すと反対側へ「ぐるん」 ---------- */
const rotorEl = document.getElementById("rotor");
let rotorId = null, rotorR = 0, rotorArc = 0, rotorAngle = 0, rotorOpenedAt = 0, rotorDragging = false;
let rotorMoving = false; const rotorMoveOff = {x:0,y:0};   // 回転状態を保ったまま半紙そのものを掴んで移動
const ROTOR_MAX = 20;                        // 静止時の傾き上限（上向き・反転とも±20°）
function rotorCenter(){
  const p = posts.get(rotorId); if(!p) return null;
  const r = wallEl.getBoundingClientRect();  // 拡縮・スクロール済みの矩形
  return {
    cx: r.left + (clamp(nxOf(p,rotorId),0,1)*(WALL_W-NOTE_W) + NOTE_W/2)*zoom,
    cy: r.top  + (clamp(nyOf(p,rotorId),0,1)*(WALL_H-NOTE_H) + NOTE_H/2)*zoom
  };
}
function rotorPoint(angle, C, Rr){           // 角度→ダイヤル上の座標（真下=0、左で＋）
  const rad = angle*Math.PI/180;
  return { x:(C - Math.sin(rad)*Rr), y:(C + Math.cos(rad)*Rr) };
}
function rotorArcPts(from, to, C, Rr){
  let s = ""; for(let t=from;t<=to;t+=1){ const q=rotorPoint(t,C,Rr); s += q.x.toFixed(1)+","+q.y.toFixed(1)+" "; } return s.trim();
}
function buildRotor(){
  const Rarc = NOTE_H*zoom*0.5 + 42;          // ダイヤル半径
  const PAD = 52;                             // 当たり判定の余白
  const R = Rarc + PAD; rotorR = R; rotorArc = Rarc;
  const h = rotorPoint(rotorAngle, R, Rarc);
  const cancelTop = Math.max(2, R - NOTE_H*zoom*0.5 - 42);   // 「やめる」は半紙の上あたり
  rotorEl.style.width = rotorEl.style.height = (2*R)+"px";
  rotorEl.innerHTML =
    `<svg width="${2*R}" height="${2*R}" viewBox="0 0 ${2*R} ${2*R}">`+
    `<circle cx="${R}" cy="${R}" r="${Rarc}" fill="none" stroke="rgba(181,52,31,.16)" stroke-width="2"/>`+
    `<polyline points="${rotorArcPts(-ROTOR_MAX,ROTOR_MAX,R,Rarc)}" fill="none" stroke="rgba(181,52,31,.5)" stroke-width="3" stroke-linecap="round"/>`+
    `<polyline points="${rotorArcPts(180-ROTOR_MAX,180+ROTOR_MAX,R,Rarc)}" fill="none" stroke="rgba(181,52,31,.5)" stroke-width="3" stroke-linecap="round"/>`+
    `<line id="rotorStem" x1="${R}" y1="${R}" x2="${h.x.toFixed(1)}" y2="${h.y.toFixed(1)}" stroke="rgba(181,52,31,.35)" stroke-width="2"/>`+
    `<circle cx="${R}" cy="${R}" r="3" fill="rgba(181,52,31,.6)"/>`+
    `<circle id="rotorHandle" cx="${h.x.toFixed(1)}" cy="${h.y.toFixed(1)}" r="13" fill="#b5341f" stroke="#fff" stroke-width="3"/>`+
    `</svg>`+
    `<button class="rotor-cancel" id="rotorCancel" title="やめる（Esc）" style="top:${cancelTop.toFixed(0)}px">やめる</button>`+
    `<div class="rotor-hint" style="top:${(R+Rarc+8).toFixed(0)}px">中央をドラッグで移動／外周で回転・外をクリックで確定・Escで取消</div>`;
}
function positionRotor(){
  const c = rotorCenter(); if(!c) return;
  rotorEl.style.left = (c.cx - rotorR) + "px";
  rotorEl.style.top  = (c.cy - rotorR) + "px";
}
function rotorNoteEl(){ return rotorId ? notesEl.querySelector('.note[data-id="'+rotorId+'"]') : null; }
function moveHandle(){
  const h = rotorPoint(rotorAngle, rotorR, rotorArc);
  const hd = rotorEl.querySelector("#rotorHandle"), st = rotorEl.querySelector("#rotorStem");
  if(hd){ hd.setAttribute("cx", h.x.toFixed(1)); hd.setAttribute("cy", h.y.toFixed(1)); }
  if(st){ st.setAttribute("x2", h.x.toFixed(1)); st.setAttribute("y2", h.y.toFixed(1)); }
}
function applyRotor(write){
  const p = posts.get(rotorId); if(p) p.angle = rotorAngle;
  setNoteTransform(rotorId, rotorAngle);
  moveHandle();
  if(write && db) update(ref(db, bpath("posts/"+rotorId)), { angle:rotorAngle }).catch(()=>{});
}
// いちばん近い静止角（上向き0±20 か 反転180±20）。巻き数を保つので戻り回転が最短
function snapAngle(a){
  const anchor = Math.round(a/180)*180;
  return anchor + clamp(Math.round(a-anchor), -ROTOR_MAX, ROTOR_MAX);
}
function angleFromPointer(e){
  const c = rotorCenter(); if(!c) return 0;
  const dx = e.clientX - c.cx, dy = e.clientY - c.cy;
  return Math.atan2(-dx, dy) * 180/Math.PI;   // 真下=0、左へ回すと＋
}
function rotorDrag(e){
  let raw = angleFromPointer(e);
  while(raw - rotorAngle >  180) raw -= 360;  // 連続化（巻き戻り防止）
  while(raw - rotorAngle < -180) raw += 360;
  rotorAngle = raw;
  applyRotor(false);                          // ドラッグ中は指の角度にそのまま追従（DB書き込み無し）
}
function rotorRelease(){
  rotorAngle = snapAngle(rotorAngle);         // 上向き／反転の±20°に落ち着く
  const el = rotorNoteEl();
  if(el){ el.classList.add("snapping"); setTimeout(()=>el.classList.remove("snapping"), 320); }  // ぐるん／settle
  applyRotor(true);
}
// 回転状態を保ったまま、半紙そのものをドラッグして移動
function rotorMoveStart(e){
  const c = rotorCenter(); if(!c) return;
  rotorMoving = true;
  rotorMoveOff.x = e.clientX - c.cx;          // ポインタと半紙中心のズレを保持
  rotorMoveOff.y = e.clientY - c.cy;
}
function rotorMoveDrag(e){
  const p = posts.get(rotorId); if(!p) return;
  const r = wallEl.getBoundingClientRect();
  const cx = (e.clientX - rotorMoveOff.x - r.left)/zoom;   // 半紙中心の狙い位置（wall内・等倍）
  const cy = (e.clientY - rotorMoveOff.y - r.top)/zoom;
  p.nx = clamp((cx - NOTE_W/2)/(WALL_W-NOTE_W), 0, 1);
  p.ny = clamp((cy - NOTE_H/2)/(WALL_H-NOTE_H), 0, 1);
  const el = rotorNoteEl();
  if(el){ el.style.left = (clamp(p.nx,0,1)*(WALL_W-NOTE_W))+"px"; el.style.top = (clamp(p.ny,0,1)*(WALL_H-NOTE_H))+"px"; }
  positionRotor();                            // ダイヤルも半紙に追従
}
function rotorMoveEnd(){
  rotorMoving = false;
  const p = posts.get(rotorId);
  if(p && db) update(ref(db, bpath("posts/"+rotorId)), { nx:p.nx, ny:p.ny }).catch(()=>{});   // 位置を保存
}
function openRotor(id, angle){
  rotorId = id;
  rotorAngle = snapAngle(angle);
  buildRotor();
  positionRotor();
  rotorEl.classList.add("show");
  rotorOpenedAt = Date.now();
}
function closeRotor(){
  if(!rotorEl.classList.contains("show")) return;
  rotorRelease();                              // 最終状態にスナップして保存
  rotorEl.classList.remove("show");
  const el = rotorNoteEl();
  if(el){ el.classList.remove("mine"); el.classList.remove("rotoring"); }   // テープが生えてくる
  rotorId = null; editingId = null; rotorDragging = false;
  // ここで初めて連投クールダウンを消費（やめた場合は消費しない）
  lastPostAt = Date.now(); LS.set("fg_lastPost", String(lastPostAt));
  if(db && myUid){ set(ref(db, "throttle/"+myUid), serverTimestamp()).catch(()=>{}); }
}
function cancelRotor(){                         // 位置決めをやめる＝貼るのを取りやめ（半紙を消す）
  if(!rotorEl.classList.contains("show")) return;
  const id = rotorId;
  rotorDragging = false;
  rotorEl.classList.remove("show");
  rotorId = null; editingId = null;
  if(!id) return;
  // 貼った直後の半紙を取り消す（自分・他者の画面から消す）
  posts.delete(id); imgCache.delete(id); imgState.delete(id); idbDel(id);
  zOverride.delete(id);
  if(activeNoteId === id) activeNoteId = null;
  render();
  if(db){
    remove(ref(db, bpath("posts/"+id))).catch(()=>{});
    remove(ref(db, bpath("imgs/"+id))).catch(()=>{});
    runTransaction(ref(db, bpath("count")), c => Math.max(0,(c||0)-1)).catch(()=>{});   // 予約した枚数枠を返す
  }
  // 描いた内容をキャンバスに戻し、半紙を開いて描き直し／貼り直しできるようにする
  if(lastDrawing){
    const im = new Image();
    im.onload = ()=>{ ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.fillStyle=PAPER; ctx.fillRect(0,0,pad.width,pad.height); ctx.drawImage(im,0,0,pad.width,pad.height); ctx.restore(); scheduleDraftSave(); };
    im.src = lastDrawing;
  }
  setDeskCollapsed(false);
}
rotorEl.addEventListener("pointerdown", e=>{
  if(e.target.closest("#rotorCancel")){ e.preventDefault(); e.stopPropagation(); cancelRotor(); return; }  // やめる
  e.preventDefault();
  const c = rotorCenter();
  const d = c ? Math.hypot(e.clientX-c.cx, e.clientY-c.cy) : 1e9;
  if(d < rotorArc - 24){ rotorMoveStart(e); }     // 中央（半紙）を掴む → 回転を保ったまま移動
  else { rotorDragging = true; rotorDrag(e); }    // 外周（ダイヤル）を掴む → 回転
});
window.addEventListener("pointermove", e=>{ if(rotorMoving) rotorMoveDrag(e); else if(rotorDragging) rotorDrag(e); });
window.addEventListener("pointerup", ()=>{ if(rotorMoving){ rotorMoveEnd(); } if(rotorDragging){ rotorDragging = false; rotorRelease(); } });
// 外側をクリックで確定（開いた直後の一瞬は無視）
